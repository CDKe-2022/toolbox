<html lang="zh-CN">
<head>

  <style>
    :root {
      --bg: #faf8f3; --bg-2: #f0ebe0; --card: #ffffff;
      --ink: #1a2e2a; --ink-soft: #4a5a55; --muted: #8b9690;
      --accent: #c2410c; --accent-soft: #fed7aa; --accent-light: #fff7ed;
      --border: #e8e2d5; --green: #1a3a32; --green-2: #2d5247; --green-light: #f0f4f2;
      --shadow: 0 1px 2px rgba(26,46,42,.04), 0 8px 24px rgba(26,46,42,.06);
      --shadow-hover: 0 4px 12px rgba(26,46,42,.08), 0 20px 48px rgba(26,46,42,.12);
    }
    *{box-sizing:border-box} html,body{margin:0;padding:0}
    body{font-family:'Noto Sans SC',system-ui,sans-serif;background:var(--bg);color:var(--ink);min-height:100vh;-webkit-font-smoothing:antialiased;position:relative;overflow-x:hidden}
    body::before,body::after{content:'';position:fixed;pointer-events:none;z-index:0}
    body::before{top:-200px;right:-200px;width:600px;height:600px;background:radial-gradient(circle,rgba(194,65,12,.07) 0%,transparent 70%);animation:float1 20s ease-in-out infinite}
    body::after{bottom:-300px;left:-300px;width:700px;height:700px;background:radial-gradient(circle,rgba(26,58,50,.06) 0%,transparent 70%);animation:float2 25s ease-in-out infinite}
    @keyframes float1{0%,100%{transform:translate(0,0)}50%{transform:translate(-30px,40px)}}
    @keyframes float2{0%,100%{transform:translate(0,0)}50%{transform:translate(40px,-30px)}}
    drop-zone{display:block}
    .btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:10px 20px;border-radius:10px;font-size:14px;font-weight:500;cursor:pointer;border:1px solid transparent;transition:all .2s ease;font-family:inherit;white-space:nowrap;line-height:1.5}
    .btn-sm{padding:6px 12px;font-size:12px}
    .btn-primary{background:var(--green);color:#fff}.btn-primary:hover{background:var(--green-2);transform:translateY(-1px)}
    .btn-ghost{background:transparent;color:var(--ink-soft);border-color:var(--border)}.btn-ghost:hover{background:var(--bg-2);color:var(--ink);border-color:var(--ink-soft)}
    .btn[disabled]{opacity:.6;cursor:not-allowed;transform:none!important;pointer-events:none}
    .tool-card{background:linear-gradient(135deg,#fff 0%,#fdfcf8 100%);border:1px solid var(--border);border-radius:16px;padding:24px;cursor:pointer;transition:all .4s cubic-bezier(.16,1,.3,1);position:relative;overflow:hidden;height:100%;text-decoration:none;color:inherit;display:block}
    .tool-card::before{content:'';position:absolute;top:0;left:0;width:4px;height:100%;background:var(--green);transform:scaleY(0);transform-origin:bottom;transition:transform .5s cubic-bezier(.16,1,.3,1)}
    .tool-card:hover{transform:translateY(-2px);box-shadow:var(--shadow-hover);border-color:var(--green-2)}
    .tool-card:hover::before{transform:scaleY(1);transform-origin:top}
    .tool-icon{width:56px;height:56px;background:linear-gradient(135deg,var(--green-light) 0%,#e3ebe7 100%);border-radius:14px;display:flex;align-items:center;justify-content:center;color:var(--green);margin-bottom:24px;transition:all .4s cubic-bezier(.16,1,.3,1)}
    .tool-card:hover .tool-icon{background:linear-gradient(135deg,var(--green) 0%,var(--green-2) 100%);color:#fff;transform:rotate(-6deg) scale(1.05)}
    .input,.textarea{width:100%;padding:16px 20px;border:1px solid var(--border);border-radius:12px;background:#fff;font-family:inherit;font-size:16px;color:var(--ink);transition:all .2s ease}
    .textarea{min-height:200px;resize:vertical;line-height:1.6}
    .input:focus,.textarea:focus{outline:none;border-color:var(--green);box-shadow:0 0 0 4px rgba(26,58,50,.08)}
    .result-box{background:linear-gradient(135deg,var(--green-light) 0%,#ecf2ee 100%);border:1px solid var(--border);border-radius:12px;padding:24px;min-height:96px;font-family:'Noto Serif SC',serif;font-size:24px;color:var(--green);font-weight:600;line-height:1.6;word-break:break-all;display:flex;align-items:center}
    .drop-zone{border:2px dashed var(--border);border-radius:16px;padding:56px 32px;text-align:center;background:linear-gradient(135deg,#fff 0%,#fdfcf8 100%);transition:all .3s ease;cursor:pointer}
    .drop-zone.dragover{border-color:var(--green);background:var(--green-light);transform:scale(1.01)}
    .drop-zone:hover{border-color:var(--ink-soft);background:#fdfbf3}
    .thumb{position:relative;width:100%;aspect-ratio:1;background:var(--bg-2);border-radius:10px;overflow:hidden;border:1px solid var(--border);transition:transform .2s ease;cursor:grab}
    .thumb:hover{transform:translateY(-2px);box-shadow:0 4px 12px rgba(0,0,0,.1)}
    .thumb img{width:100%;height:100%;object-fit:cover;pointer-events:none}
    .thumb-remove{position:absolute;top:6px;right:6px;width:22px;height:22px;background:rgba(0,0,0,.65);color:#fff;border:none;border-radius:50%;cursor:pointer;display:flex;align-items:center;justify-content:center;opacity:0;transition:opacity .2s}
    .thumb:hover .thumb-remove{opacity:1}
    .thumb-orient{position:absolute;bottom:6px;left:6px;background:rgba(0,0,0,.65);color:#fff;font-size:10px;padding:2px 6px;border-radius:4px}
    .thumb-num{position:absolute;top:6px;left:6px;background:var(--green);color:#fff;font-size:10px;padding:2px 6px;border-radius:4px;font-weight:600}
    .thumb.dragging{opacity:.4}
    .orient-option{flex:1;padding:16px 12px;border:1px solid var(--border);border-radius:12px;background:#fff;cursor:pointer;text-align:center;transition:all .2s ease;font-size:14px;color:var(--ink-soft)}
    .orient-option.active{background:var(--green);color:#fff;border-color:var(--green);box-shadow:0 4px 12px rgba(26,50,50,.2)}
    .toast{position:fixed;top:24px;left:50%;transform:translateX(-50%) translateY(-100px);background:var(--green);color:#fff;padding:12px 24px;border-radius:10px;font-size:14px;box-shadow:var(--shadow-hover);z-index:1000;transition:transform .4s cubic-bezier(.16,1,.3,1);display:flex;align-items:center;gap:8px;font-weight:500}
    .toast.show{transform:translateX(-50%) translateY(0)}.toast.error{background:var(--accent)}
    .spinner{width:16px;height:16px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .8s linear infinite;display:inline-block}

    .tool-num{display:inline-flex;align-items:center;gap:6px;font-family:'Fraunces',serif;font-size:12px;letter-spacing:.15em;color:var(--muted);text-transform:uppercase}

<body>
<div id="app" class="relative z-10"></div>
<script>
// ═══════════════════════════════════════════
// 1. UTILS
// ═══════════════════════════════════════════
const Utils = {
  _toastTimer: null, _toastEl: null,
  showToast(msg, isError = false) {
    if (!this._toastEl) {
      this._toastEl = Object.assign(document.createElement('div'), { className: 'toast' });
      this._toastEl.innerHTML = `<svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M4 8L7 11L12 5" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg><span></span>`;
      document.body.appendChild(this._toastEl);
    }
    this._toastEl.querySelector('span').textContent = msg;
    this._toastEl.classList.toggle('error', isError);
    this._toastEl.classList.add('show');
    clearTimeout(this._toastTimer);
    this._toastTimer = setTimeout(() => this._toastEl.classList.remove('show'), 2200);
  },
  copy(text) {
    if (navigator.clipboard && window.isSecureContext) return navigator.clipboard.writeText(text);
    return new Promise((res, rej) => {
      const ta = Object.assign(document.createElement('textarea'), { value: text, style: 'position:fixed;opacity:0' });
      document.body.appendChild(ta); ta.select();
      try { document.execCommand('copy'); res(); } catch (e) { rej(e); }
      document.body.removeChild(ta);
    });
  },
  copyImage(canvas) {
    return new Promise((res, rej) => {
      canvas.toBlob(blob => {
        if (!blob) return rej('Canvas to Blob failed');
        try { navigator.clipboard.write([new ClipboardItem({ 'image/png': blob })]).then(res).catch(rej); } catch (e) { rej(e); }
      }, 'image/png');
    });
  },
  downloadBlob(bytes, name, type = 'application/pdf') {
    const a = document.createElement('a');
    a.href = URL.createObjectURL(new Blob([bytes], { type }));
    a.download = name; a.click(); URL.revokeObjectURL(a.href);
  },
  downloadDataURL(dataUrl, name) {
    const a = document.createElement('a'); a.href = dataUrl; a.download = name; a.click();
  },
  isHeic(f) { const t = f.type.toLowerCase(), n = f.name.toLowerCase(); return t.includes('heic') || t.includes('heif') || n.endsWith('.heic') || n.endsWith('.heif'); },
  debounce(fn, delay) { let t; return function(...args) { clearTimeout(t); t = setTimeout(() => fn.apply(this, args), delay); }; },
  formatSize(bytes) { if (bytes < 1024) return bytes + ' B'; if (bytes < 1048576) return (bytes / 1024).toFixed(1) + ' KB'; return (bytes / 1048576).toFixed(2) + ' MB'; },

  numberToChinese(num) {
    const str = String(num).trim(); if (!str || isNaN(num)) return ''; if (parseFloat(str) === 0) return '零元整';
    const neg = str.startsWith('-'), abs = neg ? str.slice(1) : str;
    const [rawInt, rawDec = ''] = abs.split('.');
    const intStr = rawInt.replace(/^0+/, '') || '0', decStr = rawDec.slice(0, 2);
    if (intStr.length > 16) return '数字超出支持范围';
    const D = '零壹贰叁肆伍陆柒捌玖', R = ['', '拾', '佰', '仟'], U = ['', '万', '亿', '万亿'];
    const groups = []; for (let i = intStr.length; i > 0; i -= 4) groups.unshift(intStr.slice(Math.max(0, i - 4), i));
    let intRes = '', needZero = false;
    for (let i = 0; i < groups.length; i++) {
      const g = groups[i], uIdx = groups.length - 1 - i; let gStr = '', zc = 0, allZero = true;
      for (let j = 0; j < g.length; j++) {
        const d = +g[j], rIdx = g.length - 1 - j;
        if (d === 0) zc++; else { allZero = false; if (zc > 0 || (j === 0 && needZero)) gStr += '零'; gStr += D[d] + R[rIdx]; zc = 0; needZero = false; }
      }
      if (!allZero) { intRes += gStr + U[uIdx]; needZero = zc > 0; } else needZero = true;
    }
    let decRes = ''; if (decStr) { if (+decStr[0]) decRes += D[+decStr[0]] + '角'; if (decStr[1] && +decStr[1]) decRes += D[+decStr[1]] + '分'; }
    return (neg ? '负' : '') + (intRes ? intRes + '元' : '') + (decRes || (intRes ? '整' : ''));
  },

  convertCase(text, mode) {
    if (!text) return '';
    switch(mode) {
      case 'upper': return text.toUpperCase();
      case 'lower': return text.toLowerCase();
      case 'sentence': return text.toLowerCase().replace(/(^\s*\p{L}|[.!?。！？]\s*\p{L})/gu, c => c.toUpperCase());
      case 'title': return text.toLowerCase().replace(/\b\p{L}/gu, c => c.toUpperCase());
      case 'first': return text.charAt(0).toUpperCase() + text.slice(1).toLowerCase();
      default: return text;
    }
  },

  async compressImage(file, opts) {
    const img = new Image(); img.src = opts.objectUrl; await new Promise(r => img.onload = r);
    const w = Math.round(img.width * (opts.scale / 100)), h = Math.round(img.height * (opts.scale / 100));
    const c = document.createElement('canvas'); c.width = w; c.height = h;
    const ctx = c.getContext('2d'); ctx.fillStyle = '#fff'; ctx.fillRect(0, 0, w, h); ctx.drawImage(img, 0, 0, w, h);
    return new Promise(r => c.toBlob(r, `image/${opts.format}`, opts.quality));
  },

  // 修复：改为 async，确保 Logo 加载完成后再返回
  async generateQR(text, logoUrl) {
    if (!text) return null;
    let qr;
    try { qr = qrcode(0, logoUrl ? 'H' : 'M'); qr.addData(text, 'Byte'); qr.make(); } 
    catch (e) { return { error: '文本过长或包含非法字符' }; }
    
    const count = qr.getModuleCount(), cell = 10, size = count * cell;
    const canvas = document.createElement('canvas'); canvas.width = size; canvas.height = size;
    const ctx = canvas.getContext('2d'); ctx.fillStyle = '#fff'; ctx.fillRect(0, 0, size, size);
    ctx.fillStyle = '#000';
    for (let r = 0; r < count; r++) for (let c = 0; c < count; c++) if (qr.isDark(r, c)) ctx.fillRect(c * cell, r * cell, cell, cell);
    
    if (logoUrl) {
      const img = new Image(); img.src = logoUrl;
      await img.decode(); // 等待图片解码完成
      const lw = size * 0.2, lh = size * 0.2, lx = (size - lw) / 2, ly = (size - lh) / 2;
      ctx.fillStyle = '#fff'; ctx.fillRect(lx - 8, ly - 8, lw + 16, lh + 16);
      ctx.drawImage(img, lx, ly, lw, lh);
    }
    return { canvas, size, count, cell };
  }
};

// ═══════════════════════════════════════════
// 2. STATE & RESET SYSTEM (SSOT)
// ═══════════════════════════════════════════
const INITIAL_STATE = {
  home:  { search: '' },
  number: { input: '' },
  image: { files: [], mode: 'fit', orient: 'auto', quality: 0.8 },
  pdf:   { 
    files: [], mode: 'split', 
    splitMethod: 'pages', splitPages: 1, splitStart: 1, splitEnd: 1 
  },
  compress: { file: null, url: '', name: '', origSize: 0, quality: 0.8, format: 'jpeg', scale: 100, resultBlob: null, resultUrl: '' },
  text:  { input: '', mode: 'upper' },
  qr:    { text: '', logoUrl: '' }
};

const State = structuredClone(INITIAL_STATE);
let sortableInst = null, compressTaskId = 0;

function resetTool(key) {
  const oldState = State[key];
  // 内存清理
  if (key === 'image') oldState.files.forEach(f => URL.revokeObjectURL(f.url));
  if (key === 'compress') ['url', 'resultUrl'].forEach(k => { if (oldState[k]) URL.revokeObjectURL(oldState[k]); });
  if (key === 'qr' && oldState.logoUrl) URL.revokeObjectURL(oldState.logoUrl);
  
  // 状态重置
  State[key] = structuredClone(INITIAL_STATE[key]);
  
  // UI 重新渲染
  const base = (location.hash.slice(1) || '/').split('?')[0];
  (ROUTES[base] || renderHome)();
}

// ═══════════════════════════════════════════
// 3. WEB COMPONENTS
// ═══════════════════════════════════════════
class DropZone extends HTMLElement {
  connectedCallback() {
    if (this._init) return; this._init = true;
    const text = this.getAttribute('text') || '点击或拖拽文件到此处', hint = this.getAttribute('hint') || '';
    const accept = this.getAttribute('accept') || '*/*', multi = this.hasAttribute('multiple') ? 'multiple' : '';
    this.classList.add('drop-zone');
    this.innerHTML = `<input type="file" class="hidden" ${multi} accept="${accept}"><div class="tool-icon mx-auto mb-4" style="width:52px;height:52px"><svg width="24" height="24" viewBox="0 0 24 24" fill="none"><path d="M12 16V4M12 4L7 9M12 4L17 9M5 20H19" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg></div><p class="font-medium text-[--ink] mb-1 text-base">${text}</p><p class="text-xs text-[--muted]">${hint}</p>`;
    const input = this.querySelector('input');
    this.addEventListener('click', () => input.click());
    this.addEventListener('dragover', e => { e.preventDefault(); this.classList.add('dragover'); });
    this.addEventListener('dragleave', e => { e.preventDefault(); this.classList.remove('dragover'); });
    this.addEventListener('drop', e => { e.preventDefault(); this.classList.remove('dragover'); if (e.dataTransfer.files.length) this.dispatchEvent(new CustomEvent('files-selected', { detail: e.dataTransfer.files, bubbles: true })); });
    input.addEventListener('change', e => { if (e.target.files.length) this.dispatchEvent(new CustomEvent('files-selected', { detail: e.target.files, bubbles: true })); });
  }
}
customElements.define('drop-zone', DropZone);

// ═══════════════════════════════════════════
// 4. CONFIG

const TOOLS = [

  { id: 'image-to-pdf', name: '图片转 PDF', desc: '将多张图片合并为单个 PDF 文件，支持排序与压缩。', cat: '图片', icon: '<svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21,15 16,10 5,21"/></svg>' },

  { id: 'image-compress', name: '图片压缩', desc: '压缩图片体积，支持格式转换与缩放。', cat: '图片', icon: '<svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>' },
  { id: 'text-case', name: '大小写转换', desc: '一键转换英文大小写，支持句首、词首等5种模式。', cat: '文本', icon: '<svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M4 7h16M4 12h10M4 17h16"/></svg>' },

];
const IMG_OPTS = { mode: [{ v: 'fit', l: '贴合图片', s: '无白边' }, { v: 'a4', l: 'A4 标准页', s: '带白边' }], orient: [{ v: 'auto', l: '自动' }, { v: 'portrait', l: '纵向' }, { v: 'landscape', l: '横向' }], quality: [{ v: '1', l: '原图' }, { v: '0.8', l: '平衡' }, { v: '0.5', l: '极限' }] };
const CASE_OPTS = [{ v: 'upper', l: '全部大写' }, { v: 'lower', l: '全部小写' }, { v: 'sentence', l: '句首大写' }, { v: 'title', l: '词首大写' }, { v: 'first', l: '仅首字母大写' }];
const COMPRESS_FMTS = [{ v: 'jpeg', l: 'JPEG' }, { v: 'webp', l: 'WebP' }, { v: 'png', l: 'PNG' }];

// ═══════════════════════════════════════════
// 5. RENDER HELPERS

function doConvert() {
  const input = app.querySelector('#num-input'), output = app.querySelector('#num-output'); if (!input || !output) return;
  let val = input.value.replace(/[^\d.-]/g, '').replace(/-/g, (m, o) => o === 0 ? '-' : '').replace(/\./g, (m, o, s) => s.indexOf('.') === o ? '.' : '');
  if (val !== input.value) input.value = val;
  State.number.input = val;
  if (!val || val === '-' || val === '.') { output.innerHTML = '<span class="text-[--muted] text-base font-sans font-normal">结果将显示在这里</span>'; return; }
  const res = Utils.numberToChinese(val);
  output.textContent = res === '数字超出支持范围' ? '数字超出支持范围（最大16位整数）' : res;
}

async function handleImageFiles(fileList) {
  const valid = Array.from(fileList).filter(f => f.type.startsWith('image/') || f.name.match(/\.(jpg|jpeg|png|webp|bmp|heic|heif)$/i)); if (!valid.length) return;
  const results = await Promise.all(valid.map(async file => {
    try {
      let blob = file; if (Utils.isHeic(file)) blob = await heic2any({ blob: file, toType: 'image/jpeg', quality: 0.92 });
      const url = URL.createObjectURL(blob);
      const { w, h } = await new Promise((res, rej) => { const img = new Image(); img.onload = () => res({ w: img.width, h: img.height }); img.onerror = rej; img.src = url; });
      return { url, blob, w, h, name: file.name };
    } catch { Utils.showToast('处理失败: ' + file.name, true); return null; }
  }));
  State.image.files.push(...results.filter(Boolean)); renderImageList();
}

async function convertToPdf() {
  const files = State.image.files; if (!files.length) return Utils.showToast('请先选择图片', true);
  const btn = app.querySelector('#convert-img-btn'); btn.setAttribute('disabled', ''); btn.innerHTML = '<div class="spinner"></div> 正在生成...';
  try {
    const { jsPDF } = window.jspdf; let pdf = null;
    for (const f of files) {
      const img = new Image(); img.src = f.url; await new Promise(r => img.onload = r);
      const c = document.createElement('canvas'); c.width = f.w; c.height = f.h; const ctx = c.getContext('2d'); ctx.fillStyle = '#fff'; ctx.fillRect(0, 0, f.w, f.h); ctx.drawImage(img, 0, 0);
      if (State.image.mode === 'fit') {
        const o = f.w >= f.h ? 'landscape' : 'portrait'; if (!pdf) pdf = new jsPDF({ unit: 'pt', format: [f.w, f.h], orientation: o }); else pdf.addPage([f.w, f.h], o);
        pdf.addImage(c, 'JPEG', 0, 0, f.w, f.h, undefined, 'FAST');
      } else {
        const o = State.image.orient === 'auto' ? (f.w > f.h ? 'landscape' : 'portrait') : State.image.orient; if (!pdf) pdf = new jsPDF({ orientation: o, unit: 'mm', format: 'a4' }); else pdf.addPage('a4', o);
        const pw = pdf.internal.pageSize.getWidth(), ph = pdf.internal.pageSize.getHeight(), r = Math.min((pw - 20) / f.w, (ph - 20) / f.h);
        pdf.addImage(c, 'JPEG', (pw - f.w * r) / 2, (ph - f.h * r) / 2, f.w * r, f.h * r, undefined, 'FAST');
      }
    }
    pdf.save(`images_${new Date().toISOString().slice(0, 10)}.pdf`); Utils.showToast('PDF 已生成并下载');
  } catch (e) { Utils.showToast('生成失败: ' + e.message, true); } finally { btn.removeAttribute('disabled'); btn.innerHTML = '生成并下载 PDF'; }
}

// 纯 State 驱动的 PDF 拆分
async function splitPdf() {
  if (!State.pdf.files.length) return; 
  const { splitMethod, splitPages, splitStart, splitEnd } = State.pdf;
  const btn = app.querySelector('#split-btn'); btn.setAttribute('disabled', ''); btn.innerHTML = '<div class="spinner"></div> 处理中...';
  try {
    const doc = await PDFLib.PDFDocument.load(await State.pdf.files[0].arrayBuffer()), total = doc.getPageCount();
    if (splitMethod === 'pages') {
      if (!splitPages || splitPages < 1) return Utils.showToast('请输入有效的页数', true);
      for (let i = 0; i < total; i += splitPages) { 
        const nd = await PDFLib.PDFDocument.create(); 
        (await nd.copyPages(doc, Array.from({ length: Math.min(splitPages, total - i) }, (_, j) => i + j))).forEach(p => nd.addPage(p)); 
        Utils.downloadBlob(await nd.save(), `split_${Math.floor(i / splitPages) + 1}.pdf`); 
      }
    } else {
      const s = splitStart - 1, e = splitEnd; 
      if (s < 0 || e > total || s >= e) return Utils.showToast('页码范围无效', true);
      const nd = await PDFLib.PDFDocument.create(); 
      (await nd.copyPages(doc, Array.from({ length: e - s }, (_, j) => s + j))).forEach(p => nd.addPage(p)); 
      Utils.downloadBlob(await nd.save(), 'split_range.pdf');
    }
    Utils.showToast('拆分完成！');
  } catch (e) { Utils.showToast('拆分失败: ' + e.message, true); } finally { btn.removeAttribute('disabled'); btn.innerHTML = '开始拆分'; }
}

async function mergePdf() {
  if (State.pdf.files.length < 2) return Utils.showToast('请至少选择2个PDF文件', true); 
  const btn = app.querySelector('#merge-btn'); btn.setAttribute('disabled', ''); btn.innerHTML = '<div class="spinner"></div> 处理中...';
  try {
    const merged = await PDFLib.PDFDocument.create();
    for (const f of State.pdf.files) { const doc = await PDFLib.PDFDocument.load(await f.arrayBuffer()); (await merged.copyPages(doc, doc.getPageIndices())).forEach(p => merged.addPage(p)); }
    Utils.downloadBlob(await merged.save(), 'merged.pdf'); Utils.showToast('合并完成！');
  } catch (e) { Utils.showToast('合并失败: ' + e.message, true); } finally { btn.removeAttribute('disabled'); btn.innerHTML = '开始合并'; }
}

// 增加竞态保护的压缩逻辑
async function doCompress() {
  const S = State.compress; if (!S.file) return;
  const taskId = ++compressTaskId;
  const blob = await Utils.compressImage(S.file, { objectUrl: S.url, quality: S.quality, format: S.format, scale: S.scale });
  if (taskId !== compressTaskId) return; // 任务已过期，丢弃结果
  if (S.resultUrl) URL.revokeObjectURL(S.resultUrl);
  S.resultBlob = blob; S.resultUrl = URL.createObjectURL(blob);
  
  const preview = app.querySelector('#comp-preview'), placeholder = app.querySelector('#comp-placeholder');
  if (preview) { preview.src = S.resultUrl; preview.classList.remove('hidden'); placeholder?.classList.add('hidden'); }
  const newSize = blob.size, ratio = ((1 - newSize / S.origSize) * 100).toFixed(1);
  const elSize = app.querySelector('#comp-new-size'), elRatio = app.querySelector('#comp-ratio');
  if (elSize) elSize.textContent = Utils.formatSize(newSize);
  if (elRatio) elRatio.textContent = (ratio > 0 ? '-' : '+') + Math.abs(ratio) + '%';
  const dlBtn = app.querySelector('#comp-dl-btn'); if (dlBtn) dlBtn.removeAttribute('disabled');
}
const debouncedCompress = Utils.debounce(doCompress, 300);

function doTextCase() {
  const input = app.querySelector('#tc-input'), output = app.querySelector('#tc-output'); if (!input || !output) return;
  State.text.input = input.value;
  output.value = Utils.convertCase(input.value, State.text.mode);
  const chars = input.value.length, words = input.value.trim() ? input.value.trim().split(/\s+/).length : 0, lines = input.value ? input.value.split('\n').length : 0;
  const cEl = app.querySelector('#tc-chars'), wEl = app.querySelector('#tc-words'), lEl = app.querySelector('#tc-lines');
  if (cEl) cEl.textContent = chars; if (wEl) wEl.textContent = words; if (lEl) lEl.textContent = lines;
}

async function doGenerateQR() {
  const S = State.qr, box = app.querySelector('#qr-preview-box'); if (!box) return;
  if (!S.text) { box.innerHTML = '<span id="qr-placeholder" class="text-[--muted]">输入内容后生成二维码</span>'; return; }
  const res = await Utils.generateQR(S.text, S.logoUrl); // 等待异步完成
  if (res.error) { box.innerHTML = `<span class="text-[--accent]">${res.error}</span>`; return; }
  box.innerHTML = ''; box.appendChild(res.canvas);
}
function getQRSvg() {
  const S = State.qr, res = Utils.generateQR(S.text, ''); if (!res || res.error) return null;
  const { count, cell } = res; let rects = '', qr = qrcode(0, 'M'); qr.addData(S.text, 'Byte'); qr.make();
  for (let r = 0; r < count; r++) for (let c = 0; c < count; c++) if (qr.isDark(r, c)) rects += `<rect x="${c*cell}" y="${r*cell}" width="${cell}" height="${cell}"/>`;
  return `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 ${count*cell} ${count*cell}" shape-rendering="crispEdges">${rects}</svg>`;
}

// ═══════════════════════════════════════════
// 8. EVENT DELEGATION
// ═══════════════════════════════════════════
app.addEventListener('click', async e => {
  const t = e.target, closest = sel => t.closest(sel);
  if (closest('[data-action="home"]')) return location.hash = '#/';
  
  // 统一重置逻辑
  const resetMap = { 'reset-number': 'number', 'reset-image': 'image', 'reset-pdf': 'pdf', 'reset-compress': 'compress', 'reset-text': 'text', 'reset-qr': 'qr' };
  for (const [id, key] of Object.entries(resetMap)) { if (closest(`#${id}`)) return resetTool(key); }

  // Tool 01
  if (closest('#copy-input-btn')) { const v = State.number.input; if (!v) return Utils.showToast('输入为空', true); Utils.copy(v).then(() => Utils.showToast('已复制输入')); return; }
  if (closest('#copy-output-btn')) { const v = app.querySelector('#num-output').textContent; if (!v || v.includes('显示在这里')) return Utils.showToast('结果为空', true); Utils.copy(v).then(() => Utils.showToast('已复制结果')); return; }

  // Tool 02
  for (const key of ['mode', 'orient', 'quality']) { const opt = closest(`[data-${key}]`); if (opt && app.querySelector('#convert-img-btn')) { app.querySelectorAll(`[data-${key}]`).forEach(o => o.classList.remove('active')); opt.classList.add('active'); State.image[key] = key === 'quality' ? parseFloat(opt.dataset[key]) : opt.dataset[key]; return; } }
  const rmImg = closest('[data-rm-img]'); if (rmImg) { const i = +rmImg.dataset.rmImg; URL.revokeObjectURL(State.image.files[i].url); State.image.files.splice(i, 1); return renderImageList(); }
  if (closest('#convert-img-btn')) return convertToPdf();

  // Tool 03
  const pm = closest('[data-pdf-mode]'); if (pm) { State.pdf.mode = pm.dataset.pdfMode; return renderPdfTool(); }
  if (closest('#split-remove')) { State.pdf.files = []; app.querySelector('#split-preview')?.classList.add('hidden'); app.querySelector('#split-opts')?.classList.add('hidden'); return; }
  if (closest('#split-btn')) return splitPdf();
  const rmPdf = closest('[data-rm-pdf]'); if (rmPdf) { State.pdf.files.splice(+rmPdf.dataset.rmPdf, 1); return renderMergeList(); }
  if (closest('#merge-btn')) return mergePdf();

  // Tool 04
  const cfmt = closest('[data-cfmt]'); if (cfmt && app.querySelector('#comp-ctrl')) { app.querySelectorAll('[data-cfmt]').forEach(o => o.classList.remove('active')); cfmt.classList.add('active'); State.compress.format = cfmt.dataset.cfmt; return debouncedCompress(); }
  if (closest('#comp-dl-btn')) { if (State.compress.resultUrl) Utils.downloadDataURL(State.compress.resultUrl, `compressed_${Date.now()}.${State.compress.format}`); return; }

  // Tool 05
  const cm = closest('[data-case-mode]'); if (cm && app.querySelector('#tc-input')) { State.text.mode = cm.dataset.caseMode; app.querySelectorAll('[data-case-mode]').forEach(b => b.className = `btn ${b.dataset.caseMode === State.text.mode ? 'btn-primary' : 'btn-ghost'}`); return doTextCase(); }
  if (closest('#tc-copy-btn')) { const v = app.querySelector('#tc-output').value; if (!v) return Utils.showToast('结果为空', true); Utils.copy(v).then(() => Utils.showToast('已复制结果')); return; }

  // Tool 06
  if (closest('#qr-dl-png')) { const canvas = app.querySelector('#qr-preview-box canvas'); if (canvas) Utils.downloadDataURL(canvas.toDataURL('image/png'), `qrcode_${Date.now()}.png`); else Utils.showToast('请先生成二维码', true); return; }
  if (closest('#qr-dl-svg')) { const svg = getQRSvg(); if (svg) Utils.downloadBlob(svg, `qrcode_${Date.now()}.svg`, 'image/svg+xml'); else Utils.showToast('请先生成二维码', true); return; }
  if (closest('#qr-copy-img')) { const canvas = app.querySelector('#qr-preview-box canvas'); if (!canvas) return Utils.showToast('请先生成二维码', true); Utils.copyImage(canvas).then(() => Utils.showToast('图片已复制到剪贴板')).catch(() => Utils.showToast('复制失败，请尝试下载', true)); return; }
});

// IME 防抖与输入同步
let isComposing = false;
app.addEventListener('compositionstart', () => { isComposing = true; });
app.addEventListener('compositionend', (e) => { 
  isComposing = false; 
  const id = e.target.id;
  if (id === 'search-input') handleSearch(e.target.value);
  else if (id === 'num-input') doConvert();
  else if (id === 'tc-input') doTextCase();
  else if (id === 'qr-input') { State.qr.text = e.target.value; doGenerateQR(); }
});

const handleSearch = Utils.debounce((val) => { 
  State.home.search = val.toLowerCase(); 
  renderHome(); 
  const input = app.querySelector('#search-input');
  if (input) { input.focus(); input.setSelectionRange(input.value.length, input.value.length); }
}, 150);

app.addEventListener('input', e => {
  if (isComposing) return;
  const id = e.target.id;
  if (id === 'search-input') return handleSearch(e.target.value);
  if (id === 'num-input') return doConvert();
  if (id === 'tc-input') return doTextCase();
  if (id === 'qr-input') { State.qr.text = e.target.value; return Utils.debounce(doGenerateQR, 300)(); }
  if (id === 'comp-q') { State.compress.quality = e.target.value / 100; app.querySelector('#comp-q-val').textContent = e.target.value; return debouncedCompress(); }
  if (id === 'comp-s') { State.compress.scale = parseInt(e.target.value); app.querySelector('#comp-s-val').textContent = e.target.value; return debouncedCompress(); }
  
  // PDF State 同步 (SSOT)
  if (id === 'split-pages') State.pdf.splitPages = parseInt(e.target.value);
  if (id === 'split-start') State.pdf.splitStart = parseInt(e.target.value);
  if (id === 'split-end') State.pdf.splitEnd = parseInt(e.target.value);
  if (e.target.name === 'split-method') State.pdf.splitMethod = e.target.value;
});

app.addEventListener('files-selected', async e => {
  const zone = e.target;
  if (zone.id === 'img-drop') return handleImageFiles(e.detail);
  if (zone.id === 'split-drop') {
    const file = e.detail[0]; if (!file || file.type !== 'application/pdf') return Utils.showToast('请选择有效的PDF文件', true); if (file.size > 52428800) return Utils.showToast('文件大小不能超过 50MB', true);
    State.pdf.files = [file]; app.querySelector('#split-fname').textContent = file.name;
    const doc = await PDFLib.PDFDocument.load(await file.arrayBuffer()); app.querySelector('#split-pcount').textContent = doc.getPageCount(); app.querySelector('#split-end').value = doc.getPageCount();
    app.querySelector('#split-preview')?.classList.remove('hidden'); app.querySelector('#split-opts')?.classList.remove('hidden');
  }
  if (zone.id === 'merge-drop') {
    const valid = Array.from(e.detail).filter(f => f.type === 'application/pdf' && f.size <= 52428800); if (!valid.length) return Utils.showToast('请选择有效的PDF文件', true);
    if (State.pdf.files.length + valid.length > 20) return Utils.showToast('最多支持合并 20 个 PDF 文件', true);
    if ((State.pdf.files.reduce((a, f) => a + f.size, 0) + valid.reduce((a, f) => a + f.size, 0)) > 209715200) return Utils.showToast('合并文件总大小不能超过 200MB', true);
    State.pdf.files.push(...valid); renderMergeList();
  }
  if (zone.id === 'comp-drop') {
    const file = e.detail[0]; if (!file || !file.type.startsWith('image/')) return Utils.showToast('请选择有效的图片', true);
    if (State.compress.url) URL.revokeObjectURL(State.compress.url); if (State.compress.resultUrl) URL.revokeObjectURL(State.compress.resultUrl);
    const url = URL.createObjectURL(file);
    Object.assign(State.compress, { file, url, name: file.name, origSize: file.size, quality: 0.8, format: 'jpeg', scale: 100, resultBlob: null, resultUrl: '' });
    app.querySelector('#comp-ctrl')?.classList.remove('hidden'); app.querySelector('#comp-orig-size').textContent = Utils.formatSize(file.size);
    app.querySelector('#comp-new-size').textContent = '计算中...'; app.querySelector('#comp-ratio').textContent = '-';
    const preview = app.querySelector('#comp-preview'), placeholder = app.querySelector('#comp-placeholder');
    if (preview) { preview.src = url; preview.classList.remove('hidden'); placeholder?.classList.add('hidden'); }
    return doCompress();
  }
  if (zone.id === 'qr-logo-drop') {
    const file = e.detail[0]; if (!file || !file.type.startsWith('image/')) return Utils.showToast('请选择有效的图片', true);
    if (State.qr.logoUrl) URL.revokeObjectURL(State.qr.logoUrl);
    State.qr.logoUrl = URL.createObjectURL(file); return doGenerateQR();
  }
});

window.addEventListener('beforeunload', () => {
  State.image.files.forEach(f => URL.revokeObjectURL(f.url));
  ['url', 'resultUrl'].forEach(k => { if (State.compress[k]) URL.revokeObjectURL(State.compress[k]); });
  if (State.qr.logoUrl) URL.revokeObjectURL(State.qr.logoUrl);
});

// ═══════════════════════════════════════════
// 9. ROUTER (智能销毁 Sortable)
// ═══════════════════════════════════════════
const ROUTES = { '/': renderHome, '/number-to-chinese': renderNumberTool, '/image-to-pdf': renderImageTool, '/pdf-split-merge': renderPdfTool, '/image-compress': renderCompressTool, '/text-case': renderTextCaseTool, '/qrcode-generator': renderQrTool };
function router() {
  const base = (location.hash.slice(1) || '/').split('?')[0];
  // 只有在离开图片工具页时才销毁 Sortable
  if (base !== '/image-to-pdf' && sortableInst) { sortableInst.destroy(); sortableInst = null; }
  (ROUTES[base] || renderHome)(); window.scrollTo(0, 0);
}
window.addEventListener('hashchange', router);
window.addEventListener('DOMContentLoaded', () => { if (!location.hash) location.hash = '#/'; else router(); });
</script>
