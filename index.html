<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>工具集 · Toolbox</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#1a3a32">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300;9..144,400;9..144,600;9..144,700;9..144,900&family=Noto+Sans+SC:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="assets/css/common.css">
<style>
  /* 自定义断点优化 */
  @media (min-width: 1536px) {
    .container-xxl {
      max-width: 1400px;
    }
  }
  @media (min-width: 1920px) {
    .container-xxl {
      max-width: 1600px;
    }
  }
</style>
</head>
<body class="min-h-screen bg-gradient-to-br from-gray-50 to-gray-100">

<div class="container-xxl mx-auto px-4 sm:px-6 lg:px-8 py-8 md:py-12 lg:py-16 relative z-10">
  <!-- 头部区域优化 -->
  <header class="mb-10 lg:mb-16">
    <div class="flex flex-col lg:flex-row lg:items-end justify-between gap-6 mb-8">
      <div class="flex-1">
        <div class="flex items-center gap-3 mb-6">
          <div class="deco-line"></div>
          <span class="text-xs tracking-[0.3em] text-[--ink-soft] uppercase font-medium">Toolbox · 本地工具集</span>
        </div>
        <h1 class="font-display text-5xl sm:text-6xl lg:text-7xl xl:text-8xl font-black leading-[0.95] mb-6 hero-title">工具集</h1>
        <p class="text-lg text-[--ink-soft] max-w-2xl leading-relaxed font-light">
          一组在浏览器里运行的小工具，所有数据只留在你的设备上。无需注册、无需联网，关掉标签页就消失。
        </p>
      </div>
      
      <!-- 搜索框优化 -->
      <div class="w-full lg:w-auto lg:min-w-[320px] xl:min-w-[380px]">
        <div class="relative">
          <svg class="absolute left-4 top-1/2 -translate-y-1/2 text-[--muted]" width="20" height="20" viewBox="0 0 18 18" fill="none">
            <circle cx="8" cy="8" r="6" stroke="currentColor" stroke-width="1.5"/>
            <path d="M13 13L16 16" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
          </svg>
          <input type="text" id="search-input" class="input pl-12 py-4 w-full rounded-xl shadow-sm focus:shadow-md transition-shadow" placeholder="搜索工具名称或功能...">
        </div>
      </div>
    </div>
    
    <!-- 分类标签优化 -->
    <div class="flex gap-2 mb-8 flex-wrap" id="category-tabs"></div>
  </header>
  
  <!-- 工具网格优化 -->
  <div id="tools-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 2xl:grid-cols-5 gap-5 lg:gap-6">
    <!-- 工具卡片将通过JS动态插入 -->
  </div>
  
  <!-- 空状态提示（默认隐藏） -->
  <div id="empty-state" class="hidden py-20 text-center">
    <div class="mx-auto w-24 h-24 bg-gray-100 rounded-full flex items-center justify-center mb-6">
      <svg class="w-12 h-12 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M21 21l-5.197-5.197m0 0A7.5 7.5 0 105.196 5.196a7.5 7.5 0 0010.607 10.607z"></path>
      </svg>
    </div>
    <h3 class="text-xl font-semibold text-gray-700 mb-2">未找到匹配的工具</h3>
    <p class="text-gray-500 max-w-md mx-auto">尝试使用不同的关键词或浏览其他分类</p>
  </div>
  
  <!-- 页脚优化 -->
  <footer class="mt-16 lg:mt-24 pt-8 border-t border-[--border]">
    <div class="flex flex-col md:flex-row justify-between items-start md:items-center gap-6">
      <div class="flex items-center gap-3 text-sm text-[--muted]">
        <svg width="16" height="16" viewBox="0 0 14 14" fill="none">
          <path d="M7 1L2 3.5V7C2 10 4 12 7 13C10 12 12 10 12 7V3.5L7 1Z" stroke="currentColor" stroke-width="1.2" stroke-linejoin="round"/>
          <path d="M5 7L6.5 8.5L9 6" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        <span>本地运行 · 数据不出浏览器</span>
      </div>
      
      <div class="flex flex-col sm:flex-row items-start sm:items-center gap-4 text-xs text-[--muted]">
        <div class="flex items-center gap-3">
          <span class="font-display">v1.2</span>
          <span class="hidden sm:inline">·</span>
          <span>2 个工具可用</span>
        </div>
        
        <div class="flex items-center gap-4">
          <a href="#" class="hover:text-[--accent] transition-colors">使用说明</a>
          <a href="#" class="hover:text-[--accent] transition-colors">反馈建议</a>
          <a href="#" class="hover:text-[--accent] transition-colors">关于项目</a>
        </div>
      </div>
    </div>
  </footer>
</div>

<script src="assets/js/tools-data.js"></script>
<script src="assets/js/common.js"></script>
<script src="assets/js/components.js"></script>
<script src="assets/js/home.js"></script>
<script>
  // 添加搜索空状态处理
  document.addEventListener('DOMContentLoaded', function() {
    const searchInput = document.getElementById('search-input');
    const toolsGrid = document.getElementById('tools-grid');
    const emptyState = document.getElementById('empty-state');
    
    if (searchInput && toolsGrid && emptyState) {
      searchInput.addEventListener('input', function() {
        setTimeout(() => {
          const visibleCards = toolsGrid.querySelectorAll('.tool-card:not([style*="display: none"])');
          if (visibleCards.length === 0) {
            emptyState.classList.remove('hidden');
          } else {
            emptyState.classList.add('hidden');
          }
        }, 100);
      });
    }
    
    // Service Worker 注册
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js').catch(err => console.log('SW注册失败', err));
    }
  });
</script>
</body>
</html>
