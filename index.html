<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>工具集 · 效率工具箱</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🛠️</text></svg>">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/jspdf@2.5.1/dist/jspdf.umd.min.js"></script>
  <script src="https://unpkg.com/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>
  <script src="https://unpkg.com/sortablejs@1.15.0/Sortable.min.js"></script>
  <script src="https://unpkg.com/heic2any@0.0.4/dist/heic2any.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcode-generator/1.4.4/qrcode.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&family=Noto+Serif+SC:wght@600;700&family=Fraunces:wght@400;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #faf8f3; --bg-2: #f0ebe0; --ink: #1a2e2a; --ink-soft: #4a5a55; --muted: #8b9690;
      --accent: #c2410c; --accent-soft: #fde4d4; --border: #e8e2d5; --green: #1a3a32; --green-2: #2d5247; --green-light: #f0f4f2;
      --shadow-sm: 0 1px 2px rgba(26,46,42,.04), 0 4px 12px rgba(26,46,42,.06);
      --shadow-md: 0 4px 12px rgba(26,46,42,.08), 0 12px 32px rgba(26,46,42,.1);
      --shadow-lg: 0 8px 24px rgba(26,46,42,.1), 0 24px 56px rgba(26,46,42,.15);
      --transition: all .3s cubic-bezier(.4,0,.2,1);
    }
    *{box-sizing:border-box} 
    html,body{margin:0;padding:0}
    body{font-family:'Noto Sans SC',system-ui,sans-serif;background:var(--bg);color:var(--ink);min-height:100vh;-webkit-font-smoothing:antialiased;overflow-x:hidden}
    
    /* 滚动条美化 */
    ::-webkit-scrollbar{width:8px;height:8px}
    ::-webkit-scrollbar-track{background:var(--bg-2)}
    ::-webkit-scrollbar-thumb{background:var(--muted);border-radius:4px}
    ::-webkit-scrollbar-thumb:hover{background:var(--ink-soft)}
    
    /* 按钮系统 */
    .btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:10px 20px;border-radius:12px;font-size:14px;font-weight:500;cursor:pointer;border:1px solid transparent;transition:var(--transition);font-family:inherit;white-space:nowrap;line-height:1.5;position:relative;overflow:hidden}
    .btn::after{content:'';position:absolute;top:50%;left:50%;width:0;height:0;border-radius:50%;background:rgba(255,255,255,.2);transform:translate(-50%,-50%);transition:width .6s,height .6s}
    .btn:active::after{width:300px;height:300px}
    .btn-sm{padding:6px 12px;font-size:12px;border-radius:8px}
    .btn-primary{background:var(--green);color:#fff;box-shadow:var(--shadow-sm)}
    .btn-primary:hover{background:var(--green-2);transform:translateY(-2px);box-shadow:var(--shadow-md)}
    .btn-ghost{background:transparent;color:var(--ink-soft);border-color:var(--border)}
    .btn-ghost:hover{background:var(--bg-2);color:var(--ink);border-color:var(--ink-soft);transform:translateY(-1px)}
    .btn[disabled]{opacity:.6;cursor:not-allowed;transform:none!important;pointer-events:none}
    
    /* 卡片系统 */
    .tool-card{background:#fff;border:1px solid var(--border);border-radius:20px;padding:28px;cursor:pointer;transition:var(--transition);height:100%;text-decoration:none;color:inherit;display:block;position:relative;overflow:hidden}
    .tool-card::before{content:'';position:absolute;top:0;left:0;width:100%;height:4px;background:linear-gradient(90deg,var(--green),var(--green-2));transform:scaleX(0);transform-origin:left;transition:transform .4s ease}
    .tool-card:hover{transform:translateY(-6px);box-shadow:var(--shadow-lg);border-color:var(--green-2)}
    .tool-card:hover::before{transform:scaleX(1)}
    .tool-icon{width:56px;height:56px;background:var(--green-light);border-radius:16px;display:flex;align-items:center;justify-content:center;color:var(--green);margin-bottom:24px;transition:var(--transition)}
    .tool-card:hover .tool-icon{background:var(--green);color:#fff;transform:scale(1.08) rotate(-5deg)}
    
    /* 输入系统 */
    .input,.textarea{width:100%;padding:16px 20px;border:1px solid var(--border);border-radius:12px;background:#fff;font-family:inherit;font-size:16px;color:var(--ink);transition:var(--transition)}
    .textarea{min-height:200px;resize:vertical;line-height:1.6}
    .input:focus,.textarea:focus{outline:none;border-color:var(--green);box-shadow:0 0 0 4px rgba(26,58,50,.08)}
    
    /* 结果展示 */
    .result-box{background:var(--green-light);border:1px solid var(--border);border-radius:12px;padding:24px;min-height:96px;font-family:'Noto Serif SC',serif;font-size:24px;color:var(--green);font-weight:600;line-height:1.6;word-break:break-all;display:flex;align-items:center;transition:var(--transition);cursor:pointer;position:relative}
    .result-box:hover{box-shadow:var(--shadow-md);transform:translateY(-2px)}
    .result-box .copy-icon{position:absolute;top:12px;right:12px;opacity:0;transition:opacity .2s;color:var(--green);width:18px;height:18px}
    .result-box:hover .copy-icon{opacity:0.6}
    
    /* 拖拽区域 - 修复display问题 */
    .drop-zone{display:block;border:2px dashed var(--border);border-radius:20px;padding:56px 32px;text-align:center;background:#fff;transition:var(--transition);cursor:pointer;position:relative;overflow:hidden}
    .drop-zone::before{content:'';position:absolute;top:0;left:0;width:100%;height:100%;background:radial-gradient(circle at center,rgba(26,58,50,.03) 0%,transparent 70%);opacity:0;transition:opacity .3s ease}
    .drop-zone.dragover{border-color:var(--green);background:var(--green-light);transform:scale(1.01)}
    .drop-zone.dragover::before{opacity:1}
    .drop-zone:hover{border-color:var(--ink-soft);background:var(--bg-2)}
    .drop-zone .drop-zone-inner{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%}
    .drop-zone .tool-icon{margin-bottom:16px} /* 统一间距 */
    .drop-zone.compact{padding:24px} /* 用于QR Logo等小尺寸DropZone */
    
    /* 缩略图 */
    .thumb{position:relative;width:100%;aspect-ratio:1;background:var(--bg-2);border-radius:12px;overflow:hidden;border:1px solid var(--border);transition:var(--transition);cursor:grab}
    .thumb:hover{transform:translateY(-3px);box-shadow:var(--shadow-md)}
    .thumb img{width:100%;height:100%;object-fit:cover;pointer-events:none}
    .thumb-remove{position:absolute;top:6px;right:6px;width:24px;height:24px;background:rgba(0,0,0,.65);color:#fff;border:none;border-radius:50%;cursor:pointer;display:flex;align-items:center;justify-content:center;opacity:0;transition:opacity .2s}
    .thumb:hover .thumb-remove{opacity:1}
    .thumb-orient{position:absolute;bottom:6px;left:6px;background:rgba(0,0,0,.65);color:#fff;font-size:10px;padding:2px 6px;border-radius:4px}
    .thumb-num{position:absolute;top:6px;left:6px;background:var(--green);color:#fff;font-size:10px;padding:2px 6px;border-radius:4px;font-weight:600}
    .thumb.dragging{opacity:.4}
    
    /* 选项卡片 */
    .orient-option{flex:1;padding:16px 12px;border:1px solid var(--border);border-radius:12px;background:#fff;cursor:pointer;text-align:center;transition:var(--transition);font-size:14px;color:var(--ink-soft);min-width:0}
    .orient-option:hover{border-color:var(--ink-soft);transform:translateY(-2px)}
    .orient-option.active{background:var(--green);color:#fff;border-color:var(--green);box-shadow:0 4px 12px rgba(26,50,50,.2)}
    
    /* 提示框 */
    .toast{position:fixed;top:24px;left:50%;transform:translateX(-50%) translateY(-100px);background:var(--green);color:#fff;padding:14px 28px;border-radius:12px;font-size:14px;box-shadow:var(--shadow-lg);z-index:1000;transition:transform .4s cubic-bezier(.16,1,.3,1);display:flex;align-items:center;gap:8px;font-weight:500}
    .toast.show{transform:translateX(-50%) translateY(0)}
    .toast.error{background:var(--accent)}
    
    /* 加载动画 */
    .spinner{width:16px;height:16px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .8s linear infinite;display:inline-block}
    @keyframes spin{to{transform:rotate(360deg)}}
    
    /* 工具编号 */
    .tool-num{display:inline-flex;align-items:center;gap:6px;font-family:'Fraunces',serif;font-size:12px;letter-spacing:.15em;color:var(--muted);text-transform:uppercase}
    
    /* 信息卡片 */
    .info-card{background:var(--green-light);border:1px solid var(--border);border-radius:16px;padding:24px;transition:var(--transition)}
    .info-card:hover{box-shadow:var(--shadow-sm)}
    
    /* 隐藏类 */
    .hidden{display:none!important}
    
    /* 结果容器 */
    .result-container{position:relative}
    
    /* 统计盒子 */
    .stat-box{background:var(--bg-2);border-radius:12px;padding:16px;text-align:center;transition:var(--transition)}
    .stat-box:hover{transform:translateY(-2px);box-shadow:var(--shadow-sm)}
    .stat-box .val{font-size:24px;font-weight:700;color:var(--green)}
    .stat-box .lbl{font-size:12px;color:var(--muted);margin-top:4px}
    
    /* 滑块 */
    .range-slider{-webkit-appearance:none;width:100%;height:6px;border-radius:3px;background:var(--border);outline:none}
    .range-slider::-webkit-slider-thumb{-webkit-appearance:none;width:20px;height:20px;border-radius:50%;background:var(--green);cursor:pointer;border:2px solid #fff;box-shadow:0 2px 6px rgba(0,0,0,.2);transition:transform .2s}
    .range-slider::-webkit-slider-thumb:hover{transform:scale(1.2)}
    
    /* 二维码预览 */
    .qr-preview{background:#fff;padding:24px;border-radius:20px;border:1px solid var(--border);display:flex;align-items:center;justify-content:center;min-height:300px;transition:var(--transition)}
    .qr-preview:hover{box-shadow:var(--shadow-sm)}
    .qr-preview canvas,.qr-preview img{max-width:100%;max-height:400px;image-rendering:pixelated}
    
    /* 格式卡片 */
    .format-card{cursor:pointer;border:2px solid transparent;transition:var(--transition);border-radius:12px}
    .format-card:hover{transform:translateY(-2px);box-shadow:var(--shadow-sm)}
    .format-card.active{border-color:var(--green);background:var(--green-light)}
    
    /* 模拟结果 */
    .mock-result{font-family:monospace;font-size:14px;line-height:1.8;white-space:pre-wrap;background:var(--bg-2);padding:20px;border-radius:12px;min-height:300px;max-height:500px;overflow-y:auto;border:1px solid var(--border)}
    
    /* 日期结果卡片 */
    .date-result-card{background:var(--green-light);border:1px solid var(--border);border-radius:20px;padding:32px;text-align:center;transition:var(--transition)}
    .date-result-card:hover{box-shadow:var(--shadow-md)}
    .date-result-card .big-num{font-size:48px;font-weight:800;color:var(--green);line-height:1}
    .date-result-card .big-lbl{font-size:14px;color:var(--ink-soft);margin-top:8px}
    
    /* 页面过渡动画 */
    .page-enter{animation:pageEnter .4s ease forwards}
    @keyframes pageEnter{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
    
    /* 响应式调整 */
    @media (max-width: 768px) {
      .tool-card{padding:20px}
      .tool-icon{width:48px;height:48px;margin-bottom:16px}
      .btn{padding:8px 16px;font-size:13px}
      .input,.textarea{padding:12px 16px;font-size:14px}
      .result-box{font-size:20px;padding:16px}
      .drop-zone{padding:32px 16px}
      .split-opts-container{flex-wrap:wrap} /* 修复小屏幕溢出 */
    }
    
    /* 无障碍焦点样式 */
    :focus-visible{outline:2px solid var(--green);outline-offset:2px}
    
    /* 背景装饰 */
    .bg-decoration{position:fixed;top:0;left:0;width:100%;height:100%;z-index:0;pointer-events:none;overflow:hidden}
    .bg-decoration::before{content:'';position:absolute;top:-20%;right:-10%;width:50%;height:50%;background:radial-gradient(circle,rgba(26,58,50,.05) 0%,transparent 70%);border-radius:50%}
    .bg-decoration::after{content:'';position:absolute;bottom:-20%;left:-10%;width:50%;height:50%;background:radial-gradient(circle,rgba(194,65,12,.03) 0%,transparent 70%);border-radius:50%}
  </style>
</head>
<body>
<div class="bg-decoration"></div>
<div id="app" class="relative z-10"></div>
<script>
// ═══════════════════════════════════════════
// 1. 工具函数与图标系统
// ═══════════════════════════════════════════
const Icons = {
  tool1: '<svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2v20M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>',
  tool2: '<svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21,15 16,10 5,21"/></svg>',
  tool3: '<svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14,2 14,8 20,8"/></svg>',
  tool4: '<svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>',
  tool5: '<svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M4 7h16M4 12h10M4 17h16"/></svg>',
  tool6: '<svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><path d="M14 14h3v3h-3zM19 14h2v2h-2zM14 19h2v2h-2zM19 19h2v2h-2z"/></svg>',
  tool7: '<svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2v4M12 18v4M4.93 4.93l2.83 2.83M16.24 16.24l2.83 2.83M2 12h4M18 12h4M4.93 19.07l2.83-2.83M16.24 7.76l2.83-2.83"/><circle cx="12" cy="12" r="3"/></svg>',
  tool8: '<svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>',
  copy: '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>',
  get: (name) => Icons[name] || ''
};

const Utils = {
  _toastTimer: null, _toastEl: null,
  showToast(msg, isError = false) {
    if (!this._toastEl) {
      this._toastEl = Object.assign(document.createElement('div'), { className: 'toast' });
      this._toastEl.innerHTML = `<svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M4 8L7 11L12 5" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg><span></span>`;
      document.body.appendChild(this._toastEl);
    }
    this._toastEl.querySelector('span').textContent = msg;
    this._toastEl.classList.toggle('error', isError);
    this._toastEl.classList.add('show');
    clearTimeout(this._toastTimer);
    this._toastTimer = setTimeout(() => this._toastEl.classList.remove('show'), 2500);
  },
  copy(text) {
    if (navigator.clipboard && window.isSecureContext) return navigator.clipboard.writeText(text);
    return new Promise((res, rej) => {
      const ta = Object.assign(document.createElement('textarea'), { value: text, style: 'position:fixed;opacity:0' });
      document.body.appendChild(ta); ta.select();
      try { document.execCommand('copy'); res(); } catch (e) { rej(e); }
      document.body.removeChild(ta);
    });
  },
  copyImage(canvas) {
    return new Promise((res, rej) => {
      canvas.toBlob(blob => {
        if (!blob) return rej('Canvas to Blob failed');
        try { navigator.clipboard.write([new ClipboardItem({ 'image/png': blob })]).then(res).catch(rej); } catch (e) { rej(e); }
      }, 'image/png');
    });
  },
  downloadBlob(bytes, name, type = 'application/pdf') {
    const a = document.createElement('a');
    a.href = URL.createObjectURL(new Blob([bytes], { type }));
    a.download = name; a.click(); URL.revokeObjectURL(a.href);
  },
  downloadDataURL(dataUrl, name) {
    const a = document.createElement('a'); a.href = dataUrl; a.download = name; a.click();
  },
  isHeic(f) { const t = f.type.toLowerCase(), n = f.name.toLowerCase(); return t.includes('heic') || t.includes('heif') || n.endsWith('.heic') || n.endsWith('.heif'); },
  debounce(fn, delay) { let t; return function(...args) { clearTimeout(t); t = setTimeout(() => fn.apply(this, args), delay); }; },
  formatSize(bytes) { if (bytes < 1024) return bytes + ' B'; if (bytes < 1048576) return (bytes / 1024).toFixed(1) + ' KB'; return (bytes / 1048576).toFixed(2) + ' MB'; },
  formatDate(d) {
    if (!d) return '';
    const y = d.getFullYear(), m = String(d.getMonth() + 1).padStart(2, '0'), day = String(d.getDate()).padStart(2, '0');
    const weekDays = ['日', '一', '二', '三', '四', '五', '六'];
    return `${y}-${m}-${day} (周${weekDays[d.getDay()]})`;
  },
  numberToChinese(num) {
    const str = String(num).trim(); if (!str || isNaN(num)) return ''; if (parseFloat(str) === 0) return '零元整';
    const neg = str.startsWith('-'), abs = neg ? str.slice(1) : str;
    const [rawInt, rawDec = ''] = abs.split('.');
    const intStr = rawInt.replace(/^0+/, '') || '0', decStr = rawDec.slice(0, 2);
    if (intStr.length > 16) return '数字超出支持范围';
    const D = '零壹贰叁肆伍陆柒捌玖', R = ['', '拾', '佰', '仟'], U = ['', '万', '亿', '万亿'];
    const groups = []; for (let i = intStr.length; i > 0; i -= 4) groups.unshift(intStr.slice(Math.max(0, i - 4), i));
    let intRes = '', needZero = false;
    for (let i = 0; i < groups.length; i++) {
      const g = groups[i], uIdx = groups.length - 1 - i; let gStr = '', zc = 0, allZero = true;
      for (let j = 0; j < g.length; j++) {
        const d = +g[j], rIdx = g.length - 1 - j;
        if (d === 0) zc++; else { allZero = false; if (zc > 0 || (j === 0 && needZero)) gStr += '零'; gStr += D[d] + R[rIdx]; zc = 0; needZero = false; }
      }
      if (!allZero) { intRes += gStr + U[uIdx]; needZero = zc > 0; } else needZero = true;
    }
    let decRes = ''; if (decStr) { if (+decStr[0]) decRes += D[+decStr[0]] + '角'; if (decStr[1] && +decStr[1]) decRes += D[+decStr[1]] + '分'; }
    return (neg ? '负' : '') + (intRes ? intRes + '元' : '') + (decRes || (intRes ? '整' : ''));
  },
  convertCase(text, mode) {
    if (!text) return '';
    switch(mode) {
      case 'upper': return text.toUpperCase();
      case 'lower': return text.toLowerCase();
      case 'sentence': return text.toLowerCase().replace(/(^\s*\p{L}|[.!?。！？]\s*\p{L})/gu, c => c.toUpperCase());
      case 'title': return text.toLowerCase().replace(/\b\p{L}/gu, c => c.toUpperCase());
      case 'first': return text.charAt(0).toUpperCase() + text.slice(1).toLowerCase();
      default: return text;
    }
  }
};

// ═══════════════════════════════════════════
// 2. 状态管理 - 改进：get方法返回深拷贝
// ═══════════════════════════════════════════
const createStore = (initial) => {
  let state = structuredClone(initial);
  return {
    get: () => structuredClone(state), // 返回深拷贝，防止外部直接修改
    set: (updater) => { state = typeof updater === 'function' ? updater(structuredClone(state)) : updater; }
  };
};

const imageStore = createStore({ files: [], mode: 'fit', orient: 'auto', quality: 0.8 });
const pdfStore = createStore({ mode: 'split', split: { file: null, fileName: '', pageCount: 0, method: 'pages', pages: 1, start: 1, end: 1 }, merge: { files: [] } });
const compressStore = createStore({ file: null, url: '', name: '', origSize: 0, quality: 0.8, format: 'jpeg', scale: 100, resultBlob: null, resultUrl: '', estimates: { jpeg: 0, webp: 0, png: 0 } });
const textStore = createStore({ input: '', mode: 'upper' });
const qrStore = createStore({ text: '', logoUrl: '', mode: 'generate', parseResult: '' });

function resetStore(store, initial) {
  const oldState = store.get();
  if (oldState.files) oldState.files.forEach(f => f.url && URL.revokeObjectURL(f.url));
  if (oldState.url) URL.revokeObjectURL(oldState.url);
  if (oldState.resultUrl) URL.revokeObjectURL(oldState.resultUrl);
  if (oldState.logoUrl) URL.revokeObjectURL(oldState.logoUrl);
  store.set(structuredClone(initial));
  const base = (location.hash.slice(1) || '/').split('?')[0];
  (ROUTES[base] || renderHome)();
}

class DropZone extends HTMLElement {
  connectedCallback() {
    if (this._init) return; this._init = true;
    const text = this.getAttribute('text') || '点击或拖拽文件到此处', hint = this.getAttribute('hint') || '';
    const accept = this.getAttribute('accept') || '*/*', multi = this.hasAttribute('multiple') ? 'multiple' : '';
    const compact = this.hasAttribute('compact') ? 'compact' : ''; // 新增compact属性
    this.classList.add('drop-zone');
    if (compact) this.classList.add(compact);
    this.innerHTML = `<input type="file" class="hidden" ${multi} accept="${accept}"><div class="drop-zone-inner"><div class="tool-icon mx-auto" style="width:52px;height:52px">${Icons.tool4}</div><p class="font-medium text-[--ink] mb-1 text-base">${text}</p><p class="text-xs text-[--muted]">${hint}</p></div>`;
    const input = this.querySelector('input');
    this.addEventListener('click', () => input.click());
    this.addEventListener('dragover', e => { e.preventDefault(); this.classList.add('dragover'); });
    this.addEventListener('dragleave', e => { e.preventDefault(); this.classList.remove('dragover'); });
    this.addEventListener('drop', e => { e.preventDefault(); this.classList.remove('dragover'); if (e.dataTransfer.files.length) this.dispatchEvent(new CustomEvent('files-selected', { detail: e.dataTransfer.files, bubbles: true })); });
    input.addEventListener('change', e => { if (e.target.files.length) this.dispatchEvent(new CustomEvent('files-selected', { detail: e.target.files, bubbles: true })); });
  }
}
customElements.define('drop-zone', DropZone);

function doConvert() {

  let val = input.value.replace(/[^\d.-]/g, '').replace(/-/g, (m, o) => o === 0 ? '-' : '').replace(/\./g, (m, o, s) => s.indexOf('.') === o ? '.' : '');
  if (val !== input.value) input.value = val;
  if (!val || val === '-' || val === '.') { 
    output.innerHTML = '<span class="text-[--muted] text-base font-sans font-normal">结果将显示在这里</span><div class="copy-icon" style="display:none">' + Icons.copy + '</div>';

async function handleImageFiles(fileList) {
  const valid = Array.from(fileList).filter(f => f.type.startsWith('image/') || f.name.match(/\.(jpg|jpeg|png|webp|bmp|heic|heif)$/i)); if (!valid.length) return;
  const results = await Promise.all(valid.map(async file => {
    try {
      let blob = file; if (Utils.isHeic(file)) { const res = await heic2any({ blob: file, toType: 'image/jpeg', quality: 0.92 }); blob = Array.isArray(res) ? res[0] : res; }
      const url = URL.createObjectURL(blob);
      const { w, h } = await new Promise((res, rej) => { 
        const img = new Image(); 
        img.onload = () => res({ w: img.width, h: img.height }); 
        img.onerror = () => rej(new Error('图片加载失败')); 
        img.src = url; 
      });
      return { url, blob, w, h, name: file.name };
    } catch { Utils.showToast('处理失败: ' + file.name, true); return null; }
  }));
  imageStore.set(s => ({ ...s, files: [...s.files, ...results.filter(Boolean)] }));
  syncImageListDOM();
}

async function convertToPdf() {
  const files = imageStore.get().files; if (!files.length) return Utils.showToast('请先选择图片', true);
  const btn = app.querySelector('#convert-img-btn'); btn.setAttribute('disabled', ''); btn.innerHTML = '<div class="spinner"></div> 正在生成...';
  try {
    const { jsPDF } = window.jspdf; let pdf = null;
    for (const f of files) {
      // 添加错误处理
      const img = new Image(); img.src = f.url; 
      await new Promise((r, rej) => { 
        img.onload = r; 
        img.onerror = () => rej(new Error('图片加载失败')); 
      });
      const c = document.createElement('canvas'); c.width = f.w; c.height = f.h;
      const ctx = c.getContext('2d'); ctx.fillStyle = '#fff'; ctx.fillRect(0, 0, f.w, f.h); ctx.drawImage(img, 0, 0, f.w, f.h);
      const S = imageStore.get();
      if (S.mode === 'fit') {
        const o = f.w >= f.h ? 'landscape' : 'portrait'; if (!pdf) pdf = new jsPDF({ unit: 'pt', format: [f.w, f.h], orientation: o }); else pdf.addPage([f.w, f.h], o);
        pdf.addImage(c, 'JPEG', 0, 0, f.w, f.h, undefined, 'FAST');
      } else {
        const o = S.orient === 'auto' ? (f.w > f.h ? 'landscape' : 'portrait') : S.orient; if (!pdf) pdf = new jsPDF({ orientation: o, unit: 'mm', format: 'a4' }); else pdf.addPage('a4', o);
        const pw = pdf.internal.pageSize.getWidth(), ph = pdf.internal.pageSize.getHeight(), r = Math.min((pw - 20) / f.w, (ph - 20) / f.h);
        pdf.addImage(c, 'JPEG', (pw - f.w * r) / 2, (ph - f.h * r) / 2, f.w * r, f.h * r, undefined, 'FAST');
      }
    }
    pdf.save(`images_${new Date().toISOString().slice(0, 10)}.pdf`); Utils.showToast('PDF 已生成并下载');
  } catch (e) { Utils.showToast('生成失败: ' + e.message, true); } finally { btn.removeAttribute('disabled'); btn.innerHTML = '生成并下载 PDF'; }
}

async function splitPdf() {
  const split = pdfStore.get().split; if (!split.file) return; 
  const { method, pages, start, end } = split;
  const btn = app.querySelector('#split-btn'); btn.setAttribute('disabled', ''); btn.innerHTML = '<div class="spinner"></div> 处理中...';
  try {
    const doc = await PDFLib.PDFDocument.load(await split.file.arrayBuffer()), total = doc.getPageCount();
    if (method === 'pages') {
      for (let i = 0; i < total; i += pages) { const nd = await PDFLib.PDFDocument.create(); (await nd.copyPages(doc, Array.from({ length: Math.min(pages, total - i) }, (_, j) => i + j))).forEach(p => nd.addPage(p)); Utils.downloadBlob(await nd.save(), `split_${Math.floor(i / pages) + 1}.pdf`); }
    } else {
      const s = start - 1, e = end; 
      const nd = await PDFLib.PDFDocument.create(); (await nd.copyPages(doc, Array.from({ length: e - s }, (_, j) => s + j))).forEach(p => nd.addPage(p)); Utils.downloadBlob(await nd.save(), 'split_range.pdf');
    }
    Utils.showToast('拆分完成！');
  } catch (e) { Utils.showToast('拆分失败: ' + e.message, true); } finally { btn.removeAttribute('disabled'); btn.innerHTML = '开始拆分'; }
}

async function mergePdf() {

}

async function calculateEstimates(file) {
  const url = URL.createObjectURL(file); 
  const img = new Image(); img.src = url; 
  await new Promise((r, rej) => { 
    img.onload = r; 
    img.onerror = () => rej(new Error('图片加载失败')); 
  }); 
  URL.revokeObjectURL(url);
  const c = document.createElement('canvas'); c.width = img.width; c.height = img.height;
  const ctx = c.getContext('2d'); ctx.drawImage(img, 0, 0);
  const getBlobSize = (type, q) => new Promise(r => c.toBlob(b => r(b ? b.size : 0), type, q));
  const [jpeg, webp, png] = await Promise.all([getBlobSize('image/jpeg', 0.8), getBlobSize('image/webp', 0.8), getBlobSize('image/png', 1.0)]);
  compressStore.set(s => ({ ...s, estimates: { jpeg, webp, png } }));
  renderFormatCards();
}

async function doCompress() {
  const S = compressStore.get(); if (!S.file) return;
  const taskId = ++compressTaskId;
  const img = new Image(); img.src = S.url; 
  await new Promise((r, rej) => { 
    img.onload = r; 
    img.onerror = () => rej(new Error('图片加载失败')); 
  });
  const w = Math.round(img.width * (S.scale / 100)), h = Math.round(img.height * (S.scale / 100));
  const c = document.createElement('canvas'); c.width = w; c.height = h;
  const ctx = c.getContext('2d'); ctx.fillStyle = '#fff'; ctx.fillRect(0, 0, w, h); ctx.drawImage(img, 0, 0, w, h);
  const blob = await new Promise(r => c.toBlob(r, `image/${S.format}`, S.quality));
  if (taskId !== compressTaskId) return;
  if (S.resultUrl) URL.revokeObjectURL(S.resultUrl);
  compressStore.set(s => ({ ...s, resultBlob: blob, resultUrl: URL.createObjectURL(blob) }));
  const preview = app.querySelector('#comp-preview'), placeholder = app.querySelector('#comp-placeholder');
  if (preview) { preview.src = compressStore.get().resultUrl; preview.classList.remove('hidden'); placeholder?.classList.add('hidden'); }

}

async function doGenerateQR() {
  const S = qrStore.get(), box = app.querySelector('#qr-preview-box'); if (!box) return;
  if (!S.text) { box.innerHTML = '<span id="qr-placeholder" class="text-[--muted]">输入内容后生成二维码</span>'; return; }
  let qr;
  try { qr = qrcode(0, S.logoUrl ? 'H' : 'M'); qr.addData(S.text, 'Byte'); qr.make(); } catch (e) { box.innerHTML = `<span class="text-[--accent]">文本过长或包含非法字符</span>`; return; }
  const count = qr.getModuleCount(), cell = 10, size = count * cell;
  const canvas = document.createElement('canvas'); canvas.width = size; canvas.height = size;
  const ctx = canvas.getContext('2d'); ctx.fillStyle = '#fff'; ctx.fillRect(0, 0, size, size); ctx.fillStyle = '#000';
  for (let r = 0; r < count; r++) for (let c = 0; c < count; c++) if (qr.isDark(r, c)) ctx.fillRect(c * cell, r * cell, cell, cell);
  if (S.logoUrl) {
    const img = new Image(); img.src = S.logoUrl; 
    await new Promise((r, rej) => { 
      img.onload = r; 
      img.onerror = () => rej(new Error('Logo加载失败')); 
    }).catch(() => Utils.showToast('Logo加载失败，已忽略', true));
    const lw = size * 0.2, lh = size * 0.2, lx = (size - lw) / 2, ly = (size - lh) / 2;
    ctx.fillStyle = '#fff'; ctx.fillRect(lx - 8, ly - 8, lw + 16, lh + 16); ctx.drawImage(img, lx, ly, lw, lh);
  }
  box.innerHTML = ''; box.appendChild(canvas);
}

async function doParseQR(file) {
  const url = URL.createObjectURL(file); 
  const img = new Image(); img.src = url; 
  await new Promise((r, rej) => { 
    img.onload = r; 
    img.onerror = () => rej(new Error('图片加载失败')); 
  }).catch(() => { 
    Utils.showToast('图片加载失败', true); 
    URL.revokeObjectURL(url); 
    return; 
  });
  URL.revokeObjectURL(url);
  const c = document.createElement('canvas'); c.width = img.width; c.height = img.height;
  const ctx = c.getContext('2d'); ctx.drawImage(img, 0, 0);
  const imageData = ctx.getImageData(0, 0, c.width, c.height);
  const code = jsQR(imageData.data, imageData.width, imageData.height);
  const output = app.querySelector('#qr-parse-output');
  if (code) { qrStore.set(s => ({ ...s, parseResult: code.data })); output.textContent = code.data; Utils.showToast('识别成功'); } 
  else { qrStore.set(s => ({ ...s, parseResult: '' })); output.innerHTML = '<span class="text-[--accent]">未识别到二维码内容</span>'; Utils.showToast('未识别到二维码', true); }
}

function doGenerateMock() {
  const S = mockStore.get();
  const count = Math.max(1, Math.min(1000, S.count));
  let results = [];
  
  try {
    if (S.type === 'uuid') {
      for (let i = 0; i < count; i++) results.push(crypto.randomUUID());
    } else if (S.type === 'password') {
      let chars = '';
      if (S.pwdOpts.upper) chars += 'ABCDEFGHIJKLMNOPQRSTUVWXYZ';
      if (S.pwdOpts.lower) chars += 'abcdefghijklmnopqrstuvwxyz';
      if (S.pwdOpts.num) chars += '0123456789';
      if (S.pwdOpts.sym) chars += '!@#$%^&*()_+~`|{}[]:;?><,./-=';
      if (!chars) return Utils.showToast('请至少选择一种字符类型', true);
      for (let i = 0; i < count; i++) {
        let pwd = '';
        const arr = new Uint32Array(S.pwdLen);
        crypto.getRandomValues(arr);
        for (let j = 0; j < S.pwdLen; j++) pwd += chars[arr[j] % chars.length];
        results.push(pwd);
      }
    } else if (S.type === 'number') {
      const min = parseFloat(S.numMin) || 0;
      const max = parseFloat(S.numMax) || 100;
      const dec = Math.max(0, Math.min(6, S.numDec));
      for (let i = 0; i < count; i++) {
        const val = Math.random() * (max - min) + min;
        results.push(val.toFixed(dec));
      }
    } else if (S.type === 'picker') {
      const list = S.listText.split('\n').map(s => s.trim()).filter(Boolean);
      if (!list.length) return Utils.showToast('请输入候选名单', true);
      const pickCount = Math.min(count, list.length);
      const shuffled = [...list].sort(() => crypto.getRandomValues(new Uint32Array(1))[0] / 4294967295 - 0.5);
      results = shuffled.slice(0, pickCount);
    }
    
    const resStr = results.join('\n');
    mockStore.set(s => ({ ...s, result: resStr }));
    const el = app.querySelector('#mock-result');
    if (el) el.textContent = resStr;
    Utils.showToast(`成功生成 ${results.length} 条数据`);
  } catch (e) {
    Utils.showToast('生成失败: ' + e.message, true);
  }
}

function doCalculateDateDiff() {
  const startStr = app.querySelector('#date-start').value;
  const endStr = app.querySelector('#date-end').value;
  
  if (!startStr || !endStr) return Utils.showToast('请选择完整的日期', true);
  
  const start = new Date(startStr);
  const end = new Date(endStr);
  start.setHours(0,0,0,0);
  end.setHours(0,0,0,0);
  
  if (isNaN(start) || isNaN(end)) return Utils.showToast('日期格式无效', true);
  
  const totalDays = Math.abs(Math.round((end - start) / (1000 * 60 * 60 * 24)));
  
  let workDays = 0, weekendDays = 0;
  const s = start <= end ? start : end;
  const e = start <= end ? end : start;
  let current = new Date(s);
  
  while (current < e) {
    const day = current.getDay();
    if (day !== 0 && day !== 6) workDays++;
    else weekendDays++;
    current.setDate(current.getDate() + 1);
  }
  
  const later = start <= end ? end : start;
  const earlier = start <= end ? start : end;
  
  let years = later.getFullYear() - earlier.getFullYear();
  let months = later.getMonth() - earlier.getMonth();
  let days = later.getDate() - earlier.getDate();
  if (days < 0) { months--; days += new Date(later.getFullYear(), later.getMonth(), 0).getDate(); }
  if (months < 0) { years--; months += 12; }
  
  const res = { totalDays, workDays, weekendDays, years, months, days };
  dateStore.set(s => ({ ...s, startDate: startStr, endDate: endStr, result: res }));
  renderDateDiffResult(res);
}

// 修复：月份加减逻辑，正确处理月末溢出
function doCalculateDateOffset() {
  const baseStr = app.querySelector('#date-base').value;
  const offset = parseInt(app.querySelector('#date-offset').value) || 0;
  const unit = app.querySelector('#date-unit').value;
  
  if (!baseStr) return Utils.showToast('请选择基准日期', true);
  
  const base = new Date(baseStr);
  if (isNaN(base)) return Utils.showToast('日期格式无效', true);
  
  const resultDate = new Date(base);
  
  if (unit === 'days') {
    resultDate.setDate(resultDate.getDate() + offset);
  } else if (unit === 'weeks') {
    resultDate.setDate(resultDate.getDate() + (offset * 7));
  } else if (unit === 'years') {
    resultDate.setFullYear(resultDate.getFullYear() + offset);
    // 处理2月29日的情况
    if (base.getMonth() === 1 && base.getDate() === 29 && resultDate.getMonth() !== 1) {
      resultDate.setDate(0); // 设为上个月最后一天
    }
  } else if (unit === 'months') {
    // 修复月份加减逻辑：先保存原始日期，然后处理溢出
    const dayOfMonth = resultDate.getDate();
    resultDate.setDate(1); // 先设为1号，避免溢出
    resultDate.setMonth(resultDate.getMonth() + offset);
    
    // 获取目标月份的最后一天
    const targetMonth = resultDate.getMonth();
    const targetYear = resultDate.getFullYear();
    const targetMonthLastDay = new Date(targetYear, targetMonth + 1, 0).getDate();
    
    // 恢复日期，如果原始日期大于目标月份最后一天，则设为最后一天
    resultDate.setDate(Math.min(dayOfMonth, targetMonthLastDay));
  }
  
  const unitNames = { days: '天', weeks: '周', months: '个月', years: '年' };
  const dayOfWeek = resultDate.getDay();
  const isWorkday = dayOfWeek !== 0 && dayOfWeek !== 6;
  
  const res = {
    dateStr: Utils.formatDate(resultDate),
    offset,
    unitName: unitNames[unit],
    isWorkday
  };
  
  dateStore.set(s => ({ ...s, baseDate: baseStr, offset, unit, result: res }));
  renderDateCalcResult(res);
}

app.addEventListener('click', async e => {
  const t = e.target, closest = sel => t.closest(sel);

  if (closest('#reset-number')) { 
    const i = app.querySelector('#num-input'), o = app.querySelector('#num-output');

    if(o) o.innerHTML = '<span class="text-[--muted] text-base font-sans font-normal">结果将显示在这里</span><div class="copy-icon" style="display:none">' + Icons.copy + '</div>'; 
    return; 
  }
  
  // 点击结果框复制结果
  if (closest('#num-output')) {
    const output = app.querySelector('#num-output');
    const text = output.querySelector('span').textContent;
    if (text && !text.includes('结果将显示在这里') && !text.includes('数字超出支持范围')) {
      Utils.copy(text).then(() => Utils.showToast('已复制结果'));
    }
    return;
  }
  
  if (closest('#reset-image')) return resetStore(imageStore, { files: [], mode: 'fit', orient: 'auto', quality: 0.8 });
  if (closest('#reset-pdf')) return resetStore(pdfStore, { mode: 'split', split: { file: null, fileName: '', pageCount: 0, method: 'pages', pages: 1, start: 1, end: 1 }, merge: { files: [] } });
  if (closest('#reset-compress')) return resetStore(compressStore, { file: null, url: '', name: '', origSize: 0, quality: 0.8, format: 'jpeg', scale: 100, resultBlob: null, resultUrl: '', estimates: { jpeg: 0, webp: 0, png: 0 } });
  if (closest('#reset-text')) return resetStore(textStore, { input: '', mode: 'upper' });
  if (closest('#reset-qr')) return resetStore(qrStore, { text: '', logoUrl: '', mode: 'generate', parseResult: '' });
  if (closest('#reset-mock')) return resetStore(mockStore, { type: 'uuid', count: 10, pwdLen: 12, pwdOpts: { upper: true, lower: true, num: true, sym: true }, numMin: 1, numMax: 100, numDec: 2, listText: '', listCount: 1, result: '' });
  if (closest('#reset-date')) return resetStore(dateStore, { mode: 'diff', startDate: '', endDate: '', baseDate: '', offset: 1, unit: 'days', result: null });

  for (const key of ['mode', 'orient', 'quality']) { const opt = closest(`[data-${key}]`); if (opt && app.querySelector('#convert-img-btn')) { app.querySelectorAll(`[data-${key}]`).forEach(o => o.classList.remove('active')); opt.classList.add('active'); imageStore.set(s => ({ ...s, [key]: key === 'quality' ? parseFloat(opt.dataset[key]) : opt.dataset[key] })); return; } }
  
  const rmImg = closest('[data-rm-img]'); if (rmImg) { const i = +rmImg.dataset.rmImg; const files = imageStore.get().files; URL.revokeObjectURL(files[i].url); files.splice(i, 1); imageStore.set(s => ({ ...s, files })); syncImageListDOM(); return; }
  if (closest('#convert-img-btn')) return convertToPdf();

  const pm = closest('[data-pdf-mode]'); if (pm) { pdfStore.set(s => ({ ...s, mode: pm.dataset.pdfMode })); return renderPdfTool(); }
  if (closest('#split-remove')) { pdfStore.set(s => ({ ...s, split: { file: null, fileName: '', pageCount: 0, method: 'pages', pages: 1, start: 1, end: 1 } })); app.querySelector('#split-preview')?.classList.add('hidden'); app.querySelector('#split-opts')?.classList.add('hidden'); return; }
  if (closest('#split-btn')) return splitPdf();
  const rmPdf = closest('[data-rm-pdf]'); if (rmPdf) { const files = pdfStore.get().merge.files; files.splice(+rmPdf.dataset.rmPdf, 1); pdfStore.set(s => ({ ...s, merge: { files } })); return renderMergeList(); }
  if (closest('#merge-btn')) return mergePdf();

  const cfmt = closest('[data-cfmt]'); if (cfmt && app.querySelector('#comp-ctrl')) { app.querySelectorAll('[data-cfmt]').forEach(o => o.classList.remove('active')); cfmt.classList.add('active'); compressStore.set(s => ({ ...s, format: cfmt.dataset.cfmt })); renderFormatCards(); return doCompress(); }
  if (closest('#comp-dl-btn')) { const s = compressStore.get(); if (s.resultUrl) Utils.downloadDataURL(s.resultUrl, `compressed_${Date.now()}.${s.format}`); return; }

  const cm = closest('[data-case-mode]'); if (cm && app.querySelector('#tc-input')) { textStore.set(s => ({ ...s, mode: cm.dataset.caseMode })); app.querySelectorAll('[data-case-mode]').forEach(b => b.className = `btn ${b.dataset.caseMode === textStore.get().mode ? 'btn-primary' : 'btn-ghost'}`); return doTextCase(); }
  if (closest('#tc-copy-btn')) { const v = app.querySelector('#tc-output').value; if (!v) return Utils.showToast('结果为空', true); Utils.copy(v).then(() => Utils.showToast('已复制结果')); return; }

  const qm = closest('[data-qr-mode]'); if (qm) { qrStore.set(s => ({ ...s, mode: qm.dataset.qrMode })); return renderQrTool(); }
  if (closest('#qr-dl-png')) { const canvas = app.querySelector('#qr-preview-box canvas'); if (canvas) Utils.downloadDataURL(canvas.toDataURL('image/png'), `qrcode_${Date.now()}.png`); else Utils.showToast('请先生成二维码', true); return; }
  if (closest('#qr-dl-svg')) { 
    const S = qrStore.get(); if(!S.text) return Utils.showToast('请先生成二维码', true);
    let qr = qrcode(0, 'M'); qr.addData(S.text, 'Byte'); qr.make();
    const count = qr.getModuleCount(), cell = 10; let rects = '';
    for (let r = 0; r < count; r++) for (let c = 0; c < count; c++) if (qr.isDark(r, c)) rects += `<rect x="${c*cell}" y="${r*cell}" width="${cell}" height="${cell}"/>`;
    Utils.downloadBlob(`<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 ${count*cell} ${count*cell}" shape-rendering="crispEdges">${rects}</svg>`, `qrcode_${Date.now()}.svg`, 'image/svg+xml'); return; 
  }
  if (closest('#qr-copy-img')) { const canvas = app.querySelector('#qr-preview-box canvas'); if (!canvas) return Utils.showToast('请先生成二维码', true); Utils.copyImage(canvas).then(() => Utils.showToast('图片已复制到剪贴板')).catch(() => Utils.showToast('复制失败，请尝试下载', true)); return; }
  if (closest('#qr-parse-copy')) { const v = qrStore.get().parseResult; if (!v) return Utils.showToast('结果为空', true); Utils.copy(v).then(() => Utils.showToast('已复制结果')); return; }

  const mt = closest('[data-mock-type]'); 
  if (mt) { 
    mockStore.set(s => ({ ...s, type: mt.dataset.mockType })); 
    return renderMockTool(); 
  }
  if (closest('#mock-gen-btn')) return doGenerateMock();
  if (closest('#mock-copy-btn')) { const v = mockStore.get().result; if (!v) return Utils.showToast('结果为空', true); Utils.copy(v).then(() => Utils.showToast('已复制结果')); return; }
  if (closest('#mock-clear-btn')) { mockStore.set(s => ({ ...s, result: '' })); const el = app.querySelector('#mock-result'); if(el) el.textContent = '点击"立即生成"查看结果...'; return; }

  const dm = closest('[data-date-mode]'); if (dm) { dateStore.set(s => ({ ...s, mode: dm.dataset.dateMode, result: null })); return renderDateTool(); }
  if (closest('#date-calc-diff-btn')) return doCalculateDateDiff();
  if (closest('#date-calc-offset-btn')) return doCalculateDateOffset();
});

app.addEventListener('input', e => {
  const id = e.target.id;
  if (id === 'num-input') return doConvert();
  if (id === 'tc-input') return doTextCase();
  if (id === 'qr-input') { qrStore.set(s => ({ ...s, text: e.target.value })); return Utils.debounce(doGenerateQR, 300)(); }
  if (id === 'comp-q') { compressStore.set(s => ({ ...s, quality: e.target.value / 100 })); app.querySelector('#comp-q-val').textContent = e.target.value; return Utils.debounce(doCompress, 300)(); }
  if (id === 'comp-s') { compressStore.set(s => ({ ...s, scale: parseInt(e.target.value) })); app.querySelector('#comp-s-val').textContent = e.target.value; return Utils.debounce(doCompress, 300)(); }
  
  if (id === 'split-pages') pdfStore.set(s => ({ ...s, split: { ...s.split, pages: parseInt(e.target.value) } }));
  if (id === 'split-start') pdfStore.set(s => ({ ...s, split: { ...s.split, start: parseInt(e.target.value) } }));
  if (id === 'split-end') pdfStore.set(s => ({ ...s, split: { ...s.split, end: parseInt(e.target.value) } }));
  if (e.target.name === 'split-method') pdfStore.set(s => ({ ...s, split: { ...s.split, method: e.target.value } }));

  if (id === 'mock-count') mockStore.set(s => ({ ...s, count: parseInt(e.target.value) }));
  if (id === 'mock-pwd-len') { mockStore.set(s => ({ ...s, pwdLen: parseInt(e.target.value) })); e.target.previousElementSibling.textContent = `密码长度: ${e.target.value}`; }
  if (id === 'pwd-upper') mockStore.set(s => ({ ...s, pwdOpts: { ...s.pwdOpts, upper: e.target.checked } }));
  if (id === 'pwd-lower') mockStore.set(s => ({ ...s, pwdOpts: { ...s.pwdOpts, lower: e.target.checked } }));
  if (id === 'pwd-num') mockStore.set(s => ({ ...s, pwdOpts: { ...s.pwdOpts, num: e.target.checked } }));
  if (id === 'pwd-sym') mockStore.set(s => ({ ...s, pwdOpts: { ...s.pwdOpts, sym: e.target.checked } }));
  if (id === 'mock-num-min') mockStore.set(s => ({ ...s, numMin: e.target.value }));
  if (id === 'mock-num-max') mockStore.set(s => ({ ...s, numMax: e.target.value }));
  if (id === 'mock-num-dec') mockStore.set(s => ({ ...s, numDec: parseInt(e.target.value) }));
  if (id === 'mock-list') mockStore.set(s => ({ ...s, listText: e.target.value }));
});

app.addEventListener('files-selected', async e => {
  const zone = e.target;
  if (zone.id === 'img-drop') return handleImageFiles(e.detail);
  if (zone.id === 'split-drop') {
    const file = e.detail[0]; if (!file || file.type !== 'application/pdf') return Utils.showToast('请选择有效的PDF文件', true); if (file.size > 52428800) return Utils.showToast('文件大小不能超过 50MB', true);
    const doc = await PDFLib.PDFDocument.load(await file.arrayBuffer());
    const total = doc.getPageCount();
    pdfStore.set(s => ({ ...s, split: { file, fileName: file.name, pageCount: total, method: 'pages', pages: 1, start: 1, end: total } }));
    app.querySelector('#split-fname').textContent = file.name;
    app.querySelector('#split-pcount').textContent = total;
    app.querySelector('#split-end').value = total;
    app.querySelector('#split-preview')?.classList.remove('hidden');
    app.querySelector('#split-opts')?.classList.remove('hidden');
  }
  if (zone.id === 'merge-drop') {
    const valid = Array.from(e.detail).filter(f => f.type === 'application/pdf' && f.size <= 52428800); if (!valid.length) return Utils.showToast('请选择有效的PDF文件', true);
    const files = pdfStore.get().merge.files;
    if (files.length + valid.length > 20) return Utils.showToast('最多支持合并 20 个 PDF 文件', true);
    if ((files.reduce((a, f) => a + f.size, 0) + valid.reduce((a, f) => a + f.size, 0)) > 209715200) return Utils.showToast('合并文件总大小不能超过 200MB', true);
    pdfStore.set(s => ({ ...s, merge: { files: [...files, ...valid] } })); renderMergeList();
  }
  if (zone.id === 'comp-drop') {
    const file = e.detail[0]; if (!file || !file.type.startsWith('image/')) return Utils.showToast('请选择有效的图片', true);
    const s = compressStore.get();
    if (s.url) URL.revokeObjectURL(s.url); if (s.resultUrl) URL.revokeObjectURL(s.resultUrl);
    const url = URL.createObjectURL(file);
    compressStore.set({ file, url, name: file.name, origSize: file.size, quality: 0.8, format: 'jpeg', scale: 100, resultBlob: null, resultUrl: '', estimates: { jpeg: 0, webp: 0, png: 0 } });
    app.querySelector('#comp-ctrl')?.classList.remove('hidden'); app.querySelector('#comp-orig-size').textContent = Utils.formatSize(file.size);
    app.querySelector('#comp-new-size').textContent = '计算中...';
    const preview = app.querySelector('#comp-preview'), placeholder = app.querySelector('#comp-placeholder');
    if (preview) { preview.src = url; preview.classList.remove('hidden'); placeholder?.classList.add('hidden'); }
    calculateEstimates(file); return doCompress();
  }
  if (zone.id === 'qr-logo-drop') {
    const file = e.detail[0]; if (!file || !file.type.startsWith('image/')) return Utils.showToast('请选择有效的图片', true);
    if (qrStore.get().logoUrl) URL.revokeObjectURL(qrStore.get().logoUrl);
    qrStore.set(s => ({ ...s, logoUrl: URL.createObjectURL(file) })); return doGenerateQR();
  }
  if (zone.id === 'qr-parse-drop') {
    const file = e.detail[0]; if (!file || !file.type.startsWith('image/')) return Utils.showToast('请选择有效的图片', true);
    return doParseQR(file);
  }
});

window.addEventListener('beforeunload', () => {
  imageStore.get().files.forEach(f => URL.revokeObjectURL(f.url));
  const cs = compressStore.get();
  ['url', 'resultUrl'].forEach(k => { if (cs[k]) URL.revokeObjectURL(cs[k]); });
  if (qrStore.get().logoUrl) URL.revokeObjectURL(qrStore.get().logoUrl);
});
