<!-- index.html -->
<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>工具集 · 效率工具箱</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300;9..144,400;9..144,600;9..144,700;9..144,900&family=Noto+Sans+SC:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="assets/css/common.css">
<link rel="manifest" href="/manifest.json">
</head>
<body class="page-enter bg-gradient-to-br from-gray-50 to-gray-100 min-h-screen">

<div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8 md:py-12 relative z-10">
  <!-- 头部区域 -->
  <header class="mb-12">
    <div class="deco-line mb-6"></div>
    <div class="flex flex-col md:flex-row md:items-end md:justify-between gap-4">
      <div>
        <h1 class="font-display text-5xl md:text-6xl font-bold hero-title mb-4 leading-tight">效率工具集</h1>
        <p class="text-[--ink-soft] text-lg font-light">简洁、纯粹、专注的本地化工具，解决日常需求。</p>
      </div>
      <span class="tool-num">Local Tools</span>
    </div>
  </header>

  <!-- 搜索框 -->
  <div class="mb-8 max-w-md mx-auto">
    <div class="relative">
      <input 
        type="text" 
        id="search-input" 
        placeholder="搜索工具..." 
        class="w-full px-4 py-2 pl-10 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-[--green] focus:border-transparent"
      >
      <svg class="absolute left-3 top-2.5 w-5 h-5 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path>
      </svg>
    </div>
  </div>

  <!-- 分类筛选标签 -->
  <div id="categories-container" class="flex flex-wrap gap-3 mb-8">
    <!-- 分类按钮将由 JS 动态生成 -->
  </div>

  <!-- 工具卡片网格 -->
  <div id="tools-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 mb-12">
    <!-- 工具卡片将由 JS 动态生成 -->
  </div>

  <!-- 底部说明 -->
  <footer class="text-center text-sm text-[--muted] py-8 border-t border-[--border]">
    <p>所有工具均在浏览器本地运行，不会上传任何数据，请放心使用。</p>
    <p class="mt-2">当前已有 <span id="tool-count">0</span> 个工具可用</p>
  </footer>
</div>

<script src="assets/js/common.js"></script>
<script src="assets/js/components.js"></script>
<script src="assets/js/tools-data.js"></script>
<script src="assets/js/home.js"></script>
<script>
  document.addEventListener('DOMContentLoaded', () => {
    try {
      if (!window.toolData || !window.toolData.tools) {
        showError('工具数据加载失败，请刷新页面');
        return;
      }
      new HomePage();
    } catch (error) {
      console.error('初始化失败:', error);
      showError('应用初始化失败，请刷新页面');
    }
  });
</script>
</body>
</html>
