<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>工具集 · Toolbox</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300;9..144,400;9..144,600;9..144,700;9..144,900&family=Noto+Sans+SC:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="assets/css/common.css">
</head>
<body>

<div class="max-w-6xl mx-auto px-6 py-16 md:py-24 relative z-10">
  <header class="mb-16">
    <div class="flex items-center gap-3 mb-8">
      <div class="deco-line"></div>
      <span class="text-xs tracking-[0.3em] text-[--ink-soft] uppercase font-medium">Toolbox · 本地工具集</span>
    </div>
    <h1 class="font-display text-6xl md:text-8xl font-black leading-[0.95] mb-8 hero-title">
      工具集
    </h1>
    <p class="text-lg text-[--ink-soft] max-w-2xl leading-relaxed font-light">
      一组在浏览器里运行的小工具，所有数据只留在你的设备上。无需注册、无需联网，关掉标签页就消失。
    </p>
  </header>
  
  <!-- 工具卡片 -->
  <div class="grid md:grid-cols-2 lg:grid-cols-3 gap-6">
    
    <!-- 工具1：数字转中文大写 -->
    <a href="tools/number-to-chinese.html" class="tool-card block no-underline text-inherit">
      <div class="tool-icon">
        <svg width="28" height="28" viewBox="0 0 28 28" fill="none">
          <text x="14" y="21" text-anchor="middle" font-size="20" font-weight="700" font-family="Fraunces, serif" fill="currentColor">壹</text>
        </svg>
      </div>
      <div class="flex items-center justify-between mb-3">
        <h3 class="text-xl font-semibold text-[--ink]">数字转中文大写</h3>
        <span class="tool-num">01</span>
      </div>
      <p class="text-sm text-[--ink-soft] leading-relaxed mb-6">
        将阿拉伯数字转换为人民币大写金额格式，支持小数与负数，一键复制输入或输出结果。
      </p>
      <div class="flex items-center gap-2 text-xs text-[--green] font-medium">
        <span>进入工具</span>
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
          <path d="M3 7H11M11 7L7 3M11 7L7 11" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
    </a>
    
    <!-- 工具2：图片转 PDF -->
    <a href="tools/image-to-pdf.html" class="tool-card block no-underline text-inherit">
      <div class="tool-icon">
        <svg width="28" height="28" viewBox="0 0 28 28" fill="none">
          <rect x="4" y="6" width="20" height="16" rx="2" stroke="currentColor" stroke-width="1.8"/>
          <circle cx="10" cy="12" r="1.5" fill="currentColor"/>
          <path d="M5 20L11 14L15 18L19 13L23 20" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
      <div class="flex items-center justify-between mb-3">
        <h3 class="text-xl font-semibold text-[--ink]">图片转 PDF</h3>
        <span class="tool-num">02</span>
      </div>
      <p class="text-sm text-[--ink-soft] leading-relaxed mb-6">
        支持 JPEG、PNG、HEIC（苹果格式）等，多张可合并，可选页面方向，生成后直接下载。
      </p>
      <div class="flex items-center gap-2 text-xs text-[--green] font-medium">
        <span>进入工具</span>
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
          <path d="M3 7H11M11 7L7 3M11 7L7 11" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
    </a>
    
    <!-- 占位：未来工具 -->
    <div class="tool-card disabled">
      <div class="tool-icon">
        <svg width="28" height="28" viewBox="0 0 28 28" fill="none">
          <path d="M14 4V20M14 4L9 9M14 4L19 9M4 22H24" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
      <div class="flex items-center justify-between mb-3">
        <h3 class="text-xl font-semibold text-[--ink]">更多工具</h3>
        <span class="tool-num">···</span>
      </div>
      <p class="text-sm text-[--ink-soft] leading-relaxed mb-6">
        陆续添加中。如果你有想用的小工具，可以告诉我。
      </p>
      <div class="flex items-center gap-2 text-xs text-[--muted] font-medium">
        <span>敬请期待</span>
      </div>
    </div>
  </div>
  
  <footer class="mt-24 pt-8 border-t border-[--border] flex flex-col md:flex-row justify-between items-start md:items-center gap-4">
    <div class="flex items-center gap-2 text-sm text-[--muted]">
      <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
        <path d="M7 1L2 3.5V7C2 10 4 12 7 13C10 12 12 10 12 7V3.5L7 1Z" stroke="currentColor" stroke-width="1.2" stroke-linejoin="round"/>
        <path d="M5 7L6.5 8.5L9 6" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      本地运行 · 数据不出浏览器
    </div>
    <div class="text-xs text-[--muted] flex items-center gap-3">
      <span class="font-display">v1.0</span>
      <span>·</span>
      <span>2 个工具可用</span>
    </div>
  </footer>
</div>

<script src="assets/js/common.js"></script>
</body>
</html>
