<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>工具集 · Toolbox</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#1a3a32">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300;9..144,400;9..144,600;9..144,700;9..144,900&family=Noto+Sans+SC:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="assets/css/common.css">
</head>
<body>

<div class="max-w-8xl mx-auto px-6 py-16 md:py-24 relative z-10">
  <header class="mb-12">
    <div class="flex items-center gap-3 mb-8">
      <div class="deco-line"></div>
      <span class="text-xs tracking-[0.3em] text-[--ink-soft] uppercase font-medium">Toolbox · 本地工具集</span>
    </div>
    <h1 class="font-display text-6xl md:text-8xl font-black leading-[0.95] mb-8 hero-title">工具集</h1>
    <p class="text-lg text-[--ink-soft] max-w-2xl leading-relaxed font-light mb-8">
      一组在浏览器里运行的小工具，所有数据只留在你的设备上。无需注册、无需联网，关掉标签页就消失。
    </p>
    <div class="relative max-w-xl">
      <svg class="absolute left-4 top-1/2 -translate-y-1/2 text-[--muted]" width="18" height="18" viewBox="0 0 18 18" fill="none">
        <circle cx="8" cy="8" r="6" stroke="currentColor" stroke-width="1.5"/>
        <path d="M13 13L16 16" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
      </svg>
      <input type="text" id="search-input" class="input pl-11" placeholder="搜索工具名称或功能...">
    </div>
  </header>
  
  <div class="flex gap-2 mb-8 flex-wrap" id="category-tabs"></div>
  <div id="tools-grid" class="grid sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6"></div>
  
  <footer class="mt-24 pt-8 border-t border-[--border] flex flex-col md:flex-row justify-between items-start md:items-center gap-4">
    <div class="flex items-center gap-2 text-sm text-[--muted]">
      <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
        <path d="M7 1L2 3.5V7C2 10 4 12 7 13C10 12 12 10 12 7V3.5L7 1Z" stroke="currentColor" stroke-width="1.2" stroke-linejoin="round"/>
        <path d="M5 7L6.5 8.5L9 6" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      本地运行 · 数据不出浏览器
    </div>
    <div class="text-xs text-[--muted] flex items-center gap-3">
      <span class="font-display">v1.2</span><span>·</span><span>2 个工具可用</span>
    </div>
  </footer>
</div>

<script src="assets/js/tools-data.js"></script>
<script src="assets/js/common.js"></script>
<script src="assets/js/components.js"></script>
<script src="assets/js/home.js"></script>
<script>
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('sw.js').catch(err => console.log('SW注册失败', err));
  }
</script>
</body>
</html>
