<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>工具集 · 效率工具箱</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/jspdf@2.5.1/dist/jspdf.umd.min.js"></script>

<style>
:root {
  --bg: #faf8f3; --bg-2: #f0ebe0; --ink: #1a2e2a; --ink-soft: #4a5a55; --muted: #8b9690;
  --accent: #c2410c; --accent-soft: #fde4d4; --border: #e8e2d5;
  --green: #1a3a32; --green-2: #2d5247; --green-light: #f0f4f2;
  --shadow-sm: 0 1px 2px rgba(26,46,42,.04), 0 4px 12px rgba(26,46,42,.06);
  --shadow-md: 0 4px 12px rgba(26,46,42,.08), 0 12px 32px rgba(26,46,42,.1);
  --shadow-lg: 0 8px 24px rgba(26,46,42,.1), 0 24px 56px rgba(26,46,42,.15);
  --transition: all .3s cubic-bezier(.4,0,.2,1);
}
*{box-sizing:border-box} html,body{margin:0;padding:0}
body{font-family:'Noto Sans SC',system-ui,sans-serif;background:var(--bg);color:var(--ink);min-height:100vh;-webkit-font-smoothing:antialiased;overflow-x:hidden}
::-webkit-scrollbar{width:8px;height:8px} ::-webkit-scrollbar-track{background:var(--bg-2)}
::-webkit-scrollbar-thumb{background:var(--muted);border-radius:4px} ::-webkit-scrollbar-thumb:hover{background:var(--ink-soft)}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:10px 20px;border-radius:12px;font-size:14px;font-weight:500;cursor:pointer;border:1px solid transparent;transition:var(--transition);font-family:inherit;white-space:nowrap;line-height:1.5;position:relative;overflow:hidden}
.btn::after{content:'';position:absolute;top:50%;left:50%;width:0;height:0;border-radius:50%;background:rgba(255,255,255,.2);transform:translate(-50%,-50%);transition:width .6s,height .6s}
.btn:active::after{width:300px;height:300px}
.btn-sm{padding:6px 12px;font-size:12px;border-radius:8px}
.btn-primary{background:var(--green);color:#fff;box-shadow:var(--shadow-sm)}
.btn-primary:hover{background:var(--green-2);transform:translateY(-2px);box-shadow:var(--shadow-md)}
.btn-ghost{background:transparent;color:var(--ink-soft);border-color:var(--border)}
.btn-ghost:hover{background:var(--bg-2);color:var(--ink);border-color:var(--ink-soft);transform:translateY(-1px)}
.btn[disabled]{opacity:.6;cursor:not-allowed;transform:none!important;pointer-events:none}
.tool-card{background:#fff;border:1px solid var(--border);border-radius:20px;padding:28px;cursor:pointer;transition:var(--transition);height:100%;text-decoration:none;color:inherit;display:block;position:relative;overflow:hidden}
.tool-card::before{content:'';position:absolute;top:0;left:0;width:100%;height:4px;background:linear-gradient(90deg,var(--green),var(--green-2));transform:scaleX(0);transform-origin:left;transition:transform .4s ease}
.tool-card:hover{transform:translateY(-6px);box-shadow:var(--shadow-lg);border-color:var(--green-2)}
.tool-card:hover::before{transform:scaleX(1)}
.tool-icon{width:56px;height:56px;background:var(--green-light);border-radius:16px;display:flex;align-items:center;justify-content:center;color:var(--green);margin-bottom:24px;transition:var(--transition)}
.tool-card:hover .tool-icon{background:var(--green);color:#fff;transform:scale(1.08) rotate(-5deg)}
.input,.textarea{width:100%;padding:16px 20px;border:1px solid var(--border);border-radius:12px;background:#fff;font-family:inherit;font-size:16px;color:var(--ink);transition:var(--transition)}
.textarea{min-height:200px;resize:vertical;line-height:1.6}
.input:focus,.textarea:focus{outline:none;border-color:var(--green);box-shadow:0 0 0 4px rgba(26,58,50,.08)}
.result-box{background:var(--green-light);border:1px solid var(--border);border-radius:12px;padding:24px;min-height:96px;font-family:'Noto Serif SC',serif;font-size:24px;color:var(--green);font-weight:600;line-height:1.6;word-break:break-all;display:flex;align-items:center;transition:var(--transition);cursor:pointer;position:relative}
.result-box:hover{box-shadow:var(--shadow-md);transform:translateY(-2px)}
.result-box .copy-icon{position:absolute;top:12px;right:12px;opacity:0;transition:opacity .2s;color:var(--green);width:18px;height:18px}
.result-box:hover .copy-icon{opacity:0.6}
.drop-zone{display:block;border:2px dashed var(--border);border-radius:20px;padding:56px 32px;text-align:center;background:#fff;transition:var(--transition);cursor:pointer;position:relative;overflow:hidden}
.drop-zone::before{content:'';position:absolute;top:0;left:0;width:100%;height:100%;background:radial-gradient(circle at center,rgba(26,58,50,.03) 0%,transparent 70%);opacity:0;transition:opacity .3s ease}
.drop-zone.dragover{border-color:var(--green);background:var(--green-light);transform:scale(1.01)}
.drop-zone.dragover::before{opacity:1}
.drop-zone:hover{border-color:var(--ink-soft);background:var(--bg-2)}
.drop-zone .drop-zone-inner{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%}
.drop-zone .tool-icon{margin-bottom:16px}
.thumb{position:relative;width:100%;aspect-ratio:1;background:var(--bg-2);border-radius:12px;overflow:hidden;border:1px solid var(--border);transition:var(--transition);cursor:grab}
.thumb:hover{transform:translateY(-3px);box-shadow:var(--shadow-md)}
.thumb img{width:100%;height:100%;object-fit:cover;pointer-events:none}
.thumb-remove{position:absolute;top:6px;right:6px;width:24px;height:24px;background:rgba(0,0,0,.65);color:#fff;border:none;border-radius:50%;cursor:pointer;display:flex;align-items:center;justify-content:center;opacity:0;transition:opacity .2s}
.thumb:hover .thumb-remove{opacity:1}
.thumb-orient{position:absolute;bottom:6px;left:6px;background:rgba(0,0,0,.65);color:#fff;font-size:10px;padding:2px 6px;border-radius:4px}
.thumb-num{position:absolute;top:6px;left:6px;background:var(--green);color:#fff;font-size:10px;padding:2px 6px;border-radius:4px;font-weight:600}
.thumb.dragging{opacity:.4}
.orient-option{flex:1;padding:16px 12px;border:1px solid var(--border);border-radius:12px;background:#fff;cursor:pointer;text-align:center;transition:var(--transition);font-size:14px;color:var(--ink-soft);min-width:0}
.orient-option:hover{border-color:var(--ink-soft);transform:translateY(-2px)}
.orient-option.active{background:var(--green);color:#fff;border-color:var(--green);box-shadow:0 4px 12px rgba(26,50,50,.2)}
.toast{position:fixed;top:24px;left:50%;transform:translateX(-50%) translateY(-100px);background:var(--green);color:#fff;padding:14px 28px;border-radius:12px;font-size:14px;box-shadow:var(--shadow-lg);z-index:1000;transition:transform .4s cubic-bezier(.16,1,.3,1);display:flex;align-items:center;gap:8px;font-weight:500}
.toast.show{transform:translateX(-50%) translateY(0)}
.toast.error{background:var(--accent)}
.spinner{width:16px;height:16px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .8s linear infinite;display:inline-block}
@keyframes spin{to{transform:rotate(360deg)}}
.tool-num{display:inline-flex;align-items:center;gap:6px;font-family:'Fraunces',serif;font-size:12px;letter-spacing:.15em;color:var(--muted);text-transform:uppercase}
.info-card{background:var(--green-light);border:1px solid var(--border);border-radius:16px;padding:24px;transition:var(--transition)}
.info-card:hover{box-shadow:var(--shadow-sm)}
.hidden{display:none!important}
.result-container{position:relative}
.stat-box{background:var(--bg-2);border-radius:12px;padding:16px;text-align:center;transition:var(--transition)}
.stat-box:hover{transform:translateY(-2px);box-shadow:var(--shadow-sm)}
.stat-box .val{font-size:24px;font-weight:700;color:var(--green)}
.stat-box .lbl{font-size:12px;color:var(--muted);margin-top:4px}
.range-slider{-webkit-appearance:none;width:100%;height:6px;border-radius:3px;background:var(--border);outline:none}
.range-slider::-webkit-slider-thumb{-webkit-appearance:none;width:20px;height:20px;border-radius:50%;background:var(--green);cursor:pointer;border:2px solid #fff;box-shadow:0 2px 6px rgba(0,0,0,.2);transition:transform .2s}
.range-slider::-webkit-slider-thumb:hover{transform:scale(1.2)}
.format-card{cursor:pointer;border:2px solid transparent;transition:var(--transition);border-radius:12px}
.format-card:hover{transform:translateY(-2px);box-shadow:var(--shadow-sm)}
.format-card.active{border-color:var(--green);background:var(--green-light)}
.mock-result{font-family:monospace;font-size:14px;line-height:1.8;white-space:pre-wrap;background:var(--bg-2);padding:20px;border-radius:12px;min-height:300px;max-height:500px;overflow-y:auto;border:1px solid var(--border)}
.date-result-card{background:var(--green-light);border:1px solid var(--border);border-radius:20px;padding:32px;text-align:center;transition:var(--transition)}
.date-result-card:hover{box-shadow:var(--shadow-md)}
.date-result-card .big-num{font-size:48px;font-weight:800;color:var(--green);line-height:1}
.date-result-card .big-lbl{font-size:14px;color:var(--ink-soft);margin-top:8px}
.page-enter{animation:pageEnter .4s ease forwards}
@keyframes pageEnter{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
.thumb-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:24px;padding:24px;background:var(--bg-2);border-radius:20px;border:1px solid var(--border)}
.pdf-thumb{position:relative;background:#fff;border:2px solid var(--border);border-radius:12px;overflow:hidden;cursor:pointer;transition:var(--transition);box-shadow:var(--shadow-sm);aspect-ratio:1/1.414;display:flex;flex-direction:column}
.pdf-thumb:hover{transform:translateY(-4px);box-shadow:var(--shadow-md);border-color:var(--ink-soft)}
.pdf-thumb.selected{border-color:var(--green);background:var(--green-light);box-shadow:0 0 0 4px rgba(26,58,50,.1)}
.thumb-canvas-wrapper{flex:1;display:flex;align-items:center;justify-content:center;background:#f8f9fa;overflow:hidden;position:relative}
.thumb-canvas{max-width:100%;max-height:100%;object-fit:contain;display:block}
.thumb-loading{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;background:rgba(255,255,255,.8);color:var(--muted);font-size:12px;backdrop-filter:blur(2px)}
.thumb-label{padding:8px;text-align:center;font-size:12px;font-weight:500;color:var(--ink-soft);background:#fff;border-top:1px solid var(--border)}
.pdf-thumb.selected .thumb-label{background:var(--green);color:#fff;border-color:var(--green)}
.thumb-check{position:absolute;top:8px;right:8px;width:24px;height:24px;background:var(--green);color:#fff;border-radius:50%;display:flex;align-items:center;justify-content:center;opacity:0;transform:scale(.5);transition:var(--transition);box-shadow:0 2px 8px rgba(0,0,0,.2)}
.pdf-thumb.selected .thumb-check{opacity:1;transform:scale(1)}
.thumb-edit-btn{position:absolute;top:8px;left:8px;width:28px;height:28px;background:rgba(255,255,255,.9);color:var(--ink-soft);border-radius:8px;display:flex;align-items:center;justify-content:center;opacity:0;transition:var(--transition);cursor:pointer;border:1px solid var(--border);z-index:6}
.pdf-thumb:hover .thumb-edit-btn{opacity:1}
.thumb-edit-btn:hover{background:var(--green);color:#fff}
.thumb-drag-handle{position:absolute;bottom:8px;left:8px;width:24px;height:24px;background:rgba(255,255,255,.9);color:var(--ink-soft);border-radius:6px;display:flex;align-items:center;justify-content:center;opacity:0;transition:var(--transition);cursor:grab;font-size:14px;line-height:1;z-index:6;user-select:none}
.pdf-thumb:hover .thumb-drag-handle{opacity:1}
.thumb-drag-handle:active{cursor:grabbing}
.mode-delete .pdf-thumb.selected::after{content:'';position:absolute;inset:0;background:rgba(194,65,12,.2);pointer-events:none;z-index:5}
.mode-delete .pdf-thumb.selected .thumb-check{background:var(--accent)}
.mode-delete .pdf-thumb.selected .thumb-check::before{content:'✕';font-weight:bold}
.mode-delete .pdf-thumb.selected .thumb-label{background:var(--accent);text-decoration:line-through}
.pdf-page-preview{position:relative;background:#fff;border:1px solid var(--border);box-shadow:var(--shadow-md);display:flex;align-items:center;justify-content:center;overflow:hidden}
.pdf-page-preview img{display:block}
.pdf-page-preview .pdf-preview-label{position:absolute;bottom:-24px;left:50%;transform:translateX(-50%);font-size:11px;color:var(--muted);white-space:nowrap}
#global-loading{position:fixed;inset:0;background:rgba(255,255,255,.85);backdrop-filter:blur(4px);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999;gap:16px;transition:opacity .3s}
#global-loading.hidden{opacity:0;pointer-events:none}
#global-loading .spinner{width:40px;height:40px;border:4px solid var(--border);border-top-color:var(--green);border-radius:50%;animation:spin .8s linear infinite}
.editor-toolbar{display:flex;flex-wrap:wrap;gap:8px;align-items:center;padding:12px;background:#fff;border-radius:12px;border:1px solid var(--border);margin-bottom:16px}
.editor-tool-btn{display:flex;align-items:center;gap:6px;padding:8px 14px;border-radius:8px;border:2px solid transparent;background:var(--bg-2);color:var(--ink-soft);cursor:pointer;font-size:13px;font-weight:500;transition:var(--transition)}
.editor-tool-btn:hover{background:var(--green-light);color:var(--green)}
.editor-tool-btn.active{border-color:var(--green);background:var(--green-light);color:var(--green)}
.editor-color-swatch{width:28px;height:28px;border-radius:50%;border:2px solid var(--border);cursor:pointer;transition:var(--transition);padding:0}
.editor-color-swatch.active{border-color:var(--ink);transform:scale(1.15);box-shadow:0 2px 8px rgba(0,0,0,.15)}
.editor-canvas-wrapper{position:relative;display:inline-block;margin:0 auto;background:#f8f9fa;border-radius:12px;overflow:hidden;box-shadow:var(--shadow-md);max-width:100%}
.editor-canvas-wrapper canvas{display:block;max-width:100%;height:auto}
.editor-overlay{position:absolute;inset:0;cursor:crosshair}
.editor-overlay.tool-select{cursor:default}
.annotation-node{position:absolute;border:2px solid transparent;box-sizing:border-box}
.annotation-node.selected{border-color:var(--green);box-shadow:0 0 0 2px rgba(26,58,50,.2)}
.annotation-node .node-label{position:absolute;top:-20px;left:0;font-size:11px;color:var(--ink-soft);background:#fff;padding:1px 6px;border-radius:4px;white-space:nowrap}
.annotation-node .node-delete{position:absolute;top:-12px;right:-12px;width:24px;height:24px;background:var(--accent);color:#fff;border-radius:50%;display:none;align-items:center;justify-content:center;cursor:pointer;font-size:14px;box-shadow:0 2px 6px rgba(0,0,0,.2)}
.annotation-node.selected .node-delete{display:flex}
.ms-file-item{display:flex;align-items:center;gap:12px;background:#fff;border:1px solid var(--border);border-radius:12px;padding:12px 16px;transition:var(--transition);cursor:grab}
.ms-file-item:hover{box-shadow:var(--shadow-sm);transform:translateX(4px)}
.ms-file-item .drag-handle{color:var(--muted);cursor:grab}
.ms-file-item.dragging{opacity:.4}
.ms-file-item .file-info{flex:1;min-width:0}
.ms-file-item .file-name{font-size:14px;color:var(--ink);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ms-file-item .file-meta{font-size:12px;color:var(--muted)}
.ms-file-item .remove-btn{width:28px;height:28px;border-radius:50%;background:var(--bg-2);color:var(--muted);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:var(--transition)}
.ms-file-item .remove-btn:hover{background:var(--accent);color:#fff}
@media (max-width: 768px) {
  .tool-card{padding:20px} .tool-icon{width:48px;height:48px;margin-bottom:16px}
  .btn{padding:8px 16px;font-size:13px} .input,.textarea{padding:12px 16px;font-size:14px}
  .result-box{font-size:20px;padding:16px} .drop-zone{padding:32px 16px}
  .split-opts-container{flex-wrap:wrap} .thumb-grid{grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:16px;padding:16px}
}
:focus-visible{outline:2px solid var(--green);outline-offset:2px}
.bg-decoration{position:fixed;top:0;left:0;width:100%;height:100%;z-index:0;pointer-events:none;overflow:hidden}
.bg-decoration::before{content:'';position:absolute;top:-20%;right:-10%;width:50%;height:50%;background:radial-gradient(circle,rgba(26,58,50,.05) 0%,transparent 70%);border-radius:50%}
.bg-decoration::after{content:'';position:absolute;bottom:-20%;left:-10%;width:50%;height:50%;background:radial-gradient(circle,rgba(194,65,12,.03) 0%,transparent 70%);border-radius:50%}
</style>
</head>

const Utils = {
  _toastTimer: null, _toastEl: null,
  escapeHtml(str) { const d = document.createElement('div'); d.textContent = String(str); return d.innerHTML; },
  showToast(msg, isError = false) {
    if (!this._toastEl) {
      this._toastEl = Object.assign(document.createElement('div'), { className: 'toast' });
      this._toastEl.innerHTML = `<svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M4 8L7 11L12 5" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg><span></span>`;
      document.body.appendChild(this._toastEl);
    }
    this._toastEl.querySelector('span').textContent = msg;
    this._toastEl.classList.toggle('error', isError);
    this._toastEl.classList.add('show');
    clearTimeout(this._toastTimer);
    this._toastTimer = setTimeout(() => this._toastEl.classList.remove('show'), 2500);
  },
  copy(text) {
    if (navigator.clipboard && window.isSecureContext) return navigator.clipboard.writeText(text);
    return new Promise((res, rej) => {
      const ta = Object.assign(document.createElement('textarea'), { value: text, style: 'position:fixed;opacity:0' });
      document.body.appendChild(ta); ta.select();
      try { document.execCommand('copy'); res(); } catch (e) { rej(e); }
      document.body.removeChild(ta);
    });
  },
  downloadBlob(bytes, name, type = 'application/pdf') {
    const a = document.createElement('a');
    a.href = URL.createObjectURL(new Blob([bytes], { type }));
    a.download = name; a.click(); URL.revokeObjectURL(a.href);
  },
  downloadDataURL(dataUrl, name) { const a = document.createElement('a'); a.href = dataUrl; a.download = name; a.click(); },
  isHeic(f) { const t = f.type.toLowerCase(), n = f.name.toLowerCase(); return t.includes('heic') || t.includes('heif') || n.endsWith('.heic') || n.endsWith('.heif'); },
  debounce(fn, delay) { let t; return function(...args) { clearTimeout(t); t = setTimeout(() => fn.apply(this, args), delay); }; },
  hexToRgb(hex) { const r = parseInt(hex.slice(1, 3), 16), g = parseInt(hex.slice(3, 5), 16), b = parseInt(hex.slice(5, 7), 16); return { r, g, b }; },
  hexToPdfColor(hex) { const { r, g, b } = Utils.hexToRgb(hex); return PDFLib.rgb(r / 255, g / 255, b / 255); },
  uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2, 8); },
  showLoading(msg = '处理中...') {
    let el = document.getElementById('global-loading');
    if (!el) { el = document.createElement('div'); el.id = 'global-loading'; el.innerHTML = '<div class="spinner"></div><div class="text-[--ink-soft] text-sm"></div>'; document.body.appendChild(el); }
    el.querySelector('div:last-child').textContent = msg; el.classList.remove('hidden');
  },
  hideLoading() { const el = document.getElementById('global-loading'); if (el) el.classList.add('hidden'); },
  formatSize(bytes) { if (bytes < 1024) return bytes + ' B'; if (bytes < 1048576) return (bytes / 1024).toFixed(1) + ' KB'; return (bytes / 1048576).toFixed(2) + ' MB'; },
  formatDate(d) { if (!d) return ''; const y = d.getFullYear(), m = String(d.getMonth() + 1).padStart(2, '0'), day = String(d.getDate()).padStart(2, '0'); const weekDays = ['日', '一', '二', '三', '四', '五', '六']; return `${y}-${m}-${day} (周${weekDays[d.getDay()]})`; },
  numberToChinese(num) {
    const str = String(num).trim();
    if (!str || isNaN(num)) return '';
    if (parseFloat(str) === 0) return '零元整';
    const neg = str.startsWith('-'), abs = neg ? str.slice(1) : str;
    const [rawInt, rawDec = ''] = abs.split('.');
    const intStr = rawInt.replace(/^0+/, '') || '0', decStr = rawDec.slice(0, 2);
    if (intStr.length > 16) return '数字超出支持范围';
    const D = '零壹贰叁肆伍陆柒捌玖', R = ['', '拾', '佰', '仟'], U = ['', '万', '亿', '万亿'];
    const groups = [];
    for (let i = intStr.length; i > 0; i -= 4) groups.unshift(intStr.slice(Math.max(0, i - 4), i));
    let intRes = '', needZero = false;
    for (let i = 0; i < groups.length; i++) {
      const g = groups[i], uIdx = groups.length - 1 - i;
      let gStr = '', zc = 0, allZero = true;
      for (let j = 0; j < g.length; j++) {
        const d = +g[j], rIdx = g.length - 1 - j;
        if (d === 0) zc++;
        else {
          allZero = false;
          if (zc > 0 || (j === 0 && needZero)) gStr += '零';
          gStr += D[d] + R[rIdx]; zc = 0; needZero = false;
        }
      }
      if (!allZero) { intRes += gStr + U[uIdx]; needZero = zc > 0; } else needZero = true;
    }
    let decRes = '';
    if (decStr) { if (+decStr[0]) decRes += D[+decStr[0]] + '角'; if (decStr[1] && +decStr[1]) decRes += D[+decStr[1]] + '分'; }
    return (neg ? '负' : '') + (intRes ? intRes + '元' : (decRes ? '零元' : '')) + (decRes || (intRes ? '整' : ''));
  },
  convertCase(text, mode) {
    if (!text) return '';
    switch(mode) {
      case 'upper': return text.toUpperCase();
      case 'lower': return text.toLowerCase();
      case 'sentence': return text.toLowerCase().replace(/(^\s*\p{L}|[.!?。！？]\s*\p{L})/gu, c => c.toUpperCase());
      case 'title': return text.toLowerCase().replace(/(?<![\p{L}\p{N}])\p{L}/gu, c => c.toUpperCase());
      case 'first': return text.charAt(0).toUpperCase() + text.slice(1).toLowerCase();
      default: return text;
    }
  }
};

class DropZone extends HTMLElement {
  connectedCallback() {
    if (this._init) return; this._init = true;
    const text = this.getAttribute('text') || '点击或拖拽文件到此处', hint = this.getAttribute('hint') || '';
    const accept = this.getAttribute('accept') || '*/*', multi = this.hasAttribute('multiple') ? 'multiple' : '';
    this.classList.add('drop-zone');
    this.innerHTML = `<input type="file" class="hidden" ${multi} accept="${accept}"><div class="drop-zone-inner"><div class="tool-icon mx-auto" style="width:52px;height:52px">${Icons.tool4}</div><p class="font-medium text-[--ink] mb-1 text-base">${text}</p><p class="text-xs text-[--muted]">${hint}</p></div>`;
    const input = this.querySelector('input');
    this.addEventListener('click', () => input.click());
    this.addEventListener('dragover', e => { e.preventDefault(); this.classList.add('dragover'); });
    this.addEventListener('dragleave', e => { e.preventDefault(); this.classList.remove('dragover'); });
    this.addEventListener('drop', e => { e.preventDefault(); this.classList.remove('dragover'); if (e.dataTransfer.files.length) this.dispatchEvent(new CustomEvent('files-selected', { detail: e.dataTransfer.files, bubbles: true })); });
    input.addEventListener('change', e => { if (e.target.files.length) this.dispatchEvent(new CustomEvent('files-selected', { detail: e.target.files, bubbles: true })); });
  }
}
customElements.define('drop-zone', DropZone);

// PDF 合并与拆分 - 逻辑
async function handlePdfMsFiles(fileList, mode) {
  const valid = Array.from(fileList).filter(f => f.type === 'application/pdf');
  if (!valid.length) return Utils.showToast('请选择有效的 PDF 文件', true);
  Utils.showLoading('正在解析文件...');
  try {
    if (mode === 'merge') {
      const newFiles = [];
      for (const f of valid) {
        const buf = await f.arrayBuffer();
        const doc = await pdfjsLib.getDocument({ data: buf.slice(0) }).promise;
        newFiles.push({ id: Utils.uid(), file: f, name: f.name, pageCount: doc.numPages });
      }
      pdfMsStore.set(s => ({ ...s, mergeFiles: [...s.mergeFiles, ...newFiles] }));
      renderMergeView();
    } else {
      const f = valid[0];
      const buf = await f.arrayBuffer();
      const doc = await pdfjsLib.getDocument({ data: buf.slice(0) }).promise;
      pdfMsStore.set(s => ({ ...s, splitFile: { id: Utils.uid(), file: f, name: f.name, pageCount: doc.numPages, arrayBuffer: buf } }));
      renderSplitView();
    }
  } catch(e) {
    Utils.showToast('解析 PDF 失败: ' + e.message, true);
  } finally {
    Utils.hideLoading();
  }
}

async function doMergePdfs() {
  const S = pdfMsStore.get();
  if (S.mergeFiles.length < 2) return Utils.showToast('请至少上传 2 个文件进行合并', true);
  Utils.showLoading('正在合并 PDF...');
  try {
    const newDoc = await PDFLib.PDFDocument.create();
    for (const f of S.mergeFiles) {
      const arrayBuffer = await f.file.arrayBuffer();
      const srcDoc = await PDFLib.PDFDocument.load(arrayBuffer);
      const pages = await newDoc.copyPages(srcDoc, srcDoc.getPageIndices());
      pages.forEach(p => newDoc.addPage(p));
    }
    const bytes = await newDoc.save();
    Utils.downloadBlob(bytes, `merged_${new Date().toISOString().slice(0, 10)}.pdf`);
    Utils.showToast('合并完成！');
  } catch(e) {
    Utils.showToast('合并失败: ' + e.message, true);
  } finally {
    Utils.hideLoading();
  }
}

function parsePdfRanges(str, maxPage) {
  if (!str || !str.trim()) throw new Error('请输入页码范围');
  const parts = str.split(',').map(s => s.trim()).filter(Boolean);
  const groups = [];
  for (const part of parts) {
    const group = [];
    if (part.includes('-')) {
      const [s, e] = part.split('-').map(n => parseInt(n.trim(), 10));
      if (isNaN(s) || isNaN(e)) throw new Error(`无效的范围: ${part}`);
      const start = Math.max(1, s);
      const end = Math.min(maxPage, e);
      if (start > end) throw new Error(`无效的范围: ${part}`);
      for (let i = start; i <= end; i++) group.push(i);
    } else {
      const n = parseInt(part, 10);
      if (isNaN(n)) throw new Error(`无效的页码: ${part}`);
      if (n < 1 || n > maxPage) throw new Error(`页码超出范围: ${part}`);
      group.push(n);
    }
    if (group.length > 0) groups.push(group);
  }
  if (groups.length === 0) throw new Error('请输入有效的拆分范围');
  return groups;
}

async function doSplitPdf() {
  const S = pdfMsStore.get();
  if (!S.splitFile) return Utils.showToast('请先上传 PDF', true);
  Utils.showLoading('正在拆分 PDF...');
  try {
    const srcDoc = await PDFLib.PDFDocument.load(S.splitFile.arrayBuffer);
    const maxPage = srcDoc.getPageCount();
    let groups = [];
    if (S.splitMode === 'ranges') {
      groups = parsePdfRanges(S.splitRanges, maxPage);
    } else {
      for (let i = 1; i <= maxPage; i++) groups.push([i]);
    }
    
    const results = [];
    for (let i = 0; i < groups.length; i++) {
      const group = groups[i];
      const newDoc = await PDFLib.PDFDocument.create();
      const pages = await newDoc.copyPages(srcDoc, group.map(n => n - 1));
      pages.forEach(p => newDoc.addPage(p));
      const bytes = await newDoc.save();
      const name = group.length === 1 ? `page_${group[0]}.pdf` : `pages_${group[0]}-${group[group.length-1]}.pdf`;
      results.push({ name, bytes });
    }
    
    if (results.length === 1) {
      Utils.downloadBlob(results[0].bytes, results[0].name);
    } else {
      const zip = new JSZip();
      results.forEach(r => zip.file(r.name, r.bytes));
      const content = await zip.generateAsync({ type: "blob" });
      saveAs(content, `split_${S.splitFile.name.replace(/\.pdf$/i, '')}.zip`);
    }
    Utils.showToast(`成功拆分为 ${results.length} 个文件！`);
  } catch(e) {
    Utils.showToast('拆分失败: ' + e.message, true);
  } finally {
    Utils.hideLoading();
  }
}

async function initThumbnails() { const grid = document.getElementById('thumb-grid'); if (!grid || !pdfJsDoc) return; grid.innerHTML = ''; if (pdfObserver) pdfObserver.disconnect(); if (pdfSortable) { pdfSortable.destroy(); pdfSortable = null; } const fragment = document.createDocumentFragment(); const S = pdfStore.get(); const order = S.pageOrder.length ? S.pageOrder : Array.from({ length: S.pageCount }, (_, i) => i + 1); for (let displayIdx = 0; displayIdx < order.length; displayIdx++) { const origPage = order[displayIdx]; const div = document.createElement('div'); div.className = `pdf-thumb ${S.selected.includes(origPage) ? 'selected' : ''}`; div.dataset.page = origPage; div.dataset.displayIdx = displayIdx; const rot = S.rotations[origPage] || 0; const hasAnn = S.annotations[origPage] && S.annotations[origPage].length; div.innerHTML = ` <div class="thumb-canvas-wrapper"> <canvas class="thumb-canvas"></canvas> <div class="thumb-loading">渲染中...</div> <button class="thumb-edit-btn" data-edit-page="${origPage}" title="标注遮挡">${Icons.cursor}</button> <div class="thumb-drag-handle" title="拖拽排序">⠿</div> </div> <div class="thumb-label">第 ${displayIdx + 1} 页${rot ? ' [' + rot + '°]' : ''}${hasAnn ? ' [标注]' : ''}</div> <div class="thumb-check">${Icons.check}</div> `; div.addEventListener('click', (e) => { if (pdfDragFlag) { pdfDragFlag = false; return; } if (e.target.closest('[data-edit-page]')) return; toggleSelect(origPage); }); fragment.appendChild(div); } grid.appendChild(fragment); pdfSortable = Sortable.create(grid, { animation: 150, ghostClass: 'dragging', handle: '.thumb-drag-handle', onStart: () => { pdfDragFlag = true; }, onEnd: e => { const order = [...pdfStore.get().pageOrder]; const movedItem = order.splice(e.oldIndex, 1)[0]; order.splice(e.newIndex, 0, movedItem); pdfStore.set(s => ({ ...s, pageOrder: order })); const thumbs = grid.querySelectorAll('.pdf-thumb'); thumbs.forEach((thumb, idx) => { const origPage = parseInt(thumb.dataset.page); const label = thumb.querySelector('.thumb-label'); const rot = pdfStore.get().rotations[origPage] || 0; const hasAnn = pdfStore.get().annotations[origPage] && pdfStore.get().annotations[origPage].length; if (label) label.textContent = `第 ${idx + 1} 页${rot ? ' [' + rot + '°]' : ''}${hasAnn ? ' [标注]' : ''}`; thumb.dataset.displayIdx = idx; }); setTimeout(() => { pdfDragFlag = false; }, 100); } }); pdfObserver = new IntersectionObserver((entries) => { entries.forEach(entry => { if (entry.isIntersecting) { const pageNum = parseInt(entry.target.dataset.page); renderThumbCanvas(entry.target, pageNum); pdfObserver.unobserve(entry.target); } }); }, { rootMargin: '300px' }); grid.querySelectorAll('.pdf-thumb').forEach(el => pdfObserver.observe(el)); }
async function renderThumbCanvas(thumbEl, pageNum) { const canvas = thumbEl.querySelector('.thumb-canvas'); const loading = thumbEl.querySelector('.thumb-loading'); try { const page = await pdfJsDoc.getPage(pageNum); const rot = pdfStore.get().rotations[pageNum] || 0; const viewport = page.getViewport({ scale: 0.4, rotation: rot }); canvas.width = viewport.width; canvas.height = viewport.height; const ctx = canvas.getContext('2d'); await page.render({ canvasContext: ctx, viewport }).promise; const anns = pdfStore.get().annotations[pageNum]; if (anns && anns.length) { anns.forEach(ann => { ctx.fillStyle = ann.color; const x = ann.x * canvas.width; const y = ann.y * canvas.height; const w = ann.w * canvas.width; const h = ann.h * canvas.height; if (ann.type === 'rect') { ctx.fillRect(x, y, w, h); } }); } loading.style.display = 'none'; } catch (e) { loading.textContent = '渲染失败'; loading.style.color = 'var(--accent)'; } }
function toggleSelect(pageNum) { pdfStore.set(s => { const idx = s.selected.indexOf(pageNum); if (idx > -1) s.selected.splice(idx, 1); else s.selected.push(pageNum); return { ...s, selected: s.selected }; }); updateThumbUI(); }
function updateThumbUI() { const S = pdfStore.get(); document.querySelectorAll('.pdf-thumb').forEach(el => { const p = parseInt(el.dataset.page); el.classList.toggle('selected', S.selected.includes(p)); }); const statsEl = document.getElementById('pdf-stats'); if (statsEl) statsEl.textContent = `共 ${S.pageCount} 页 · 已选 ${S.selected.length} 页`; }
function rotateSelectedPages(direction) { const S = pdfStore.get(); if (S.selected.length === 0) return Utils.showToast('请先选中页面再旋转', true); pdfStore.set(s => { const rotations = { ...s.rotations }; S.selected.forEach(p => { rotations[p] = ((rotations[p] || 0) + direction + 360) % 360; }); return { ...s, rotations }; }); S.selected.forEach(p => { const thumbEl = document.querySelector(`.pdf-thumb[data-page="${p}"]`); if (thumbEl) { const label = thumbEl.querySelector('.thumb-label'); const displayIdx = parseInt(thumbEl.dataset.displayIdx); const rot = pdfStore.get().rotations[p] || 0; const hasAnn = pdfStore.get().annotations[p] && pdfStore.get().annotations[p].length; if (label) label.textContent = `第 ${displayIdx + 1} 页${rot ? ' [' + rot + '°]' : ''}${hasAnn ? ' [标注]' : ''}`; renderThumbCanvas(thumbEl, p); } }); Utils.showToast(`已${direction > 0 ? '右' : '左'}转 ${S.selected.length} 页`); }
async function processPdf() { const S = pdfStore.get(); if (!currentFile) return; if (S.mode === 'extract' && S.selected.length === 0) return Utils.showToast('提取模式下，请至少选择一页保留', true); if (S.mode === 'delete' && S.selected.length === S.pageCount) return Utils.showToast('删除模式下，不能删除所有页面', true); Utils.showLoading('正在处理 PDF...'); try { const pdfDoc = await PDFLib.PDFDocument.load(pdfArrayBuffer); const newDoc = await PDFLib.PDFDocument.create(); const order = S.pageOrder.length ? S.pageOrder : Array.from({ length: S.pageCount }, (_, i) => i + 1); let finalPages = []; if (S.mode === 'delete') { const removeSet = new Set(S.selected); finalPages = order.filter(p => !removeSet.has(p)); } else { finalPages = order.filter(p => S.selected.includes(p)); } if (finalPages.length === 0) throw new Error('没有保留任何页面'); const pageIndices = finalPages.map(p => p - 1); const copiedPages = await newDoc.copyPages(pdfDoc, pageIndices); for (let i = 0; i < copiedPages.length; i++) { const originalPageNum = finalPages[i]; const page = copiedPages[i]; newDoc.addPage(page); const rot = S.rotations[originalPageNum] || 0; if (rot) { const degrees = { 90: PDFLib.degrees(90), 180: PDFLib.degrees(180), 270: PDFLib.degrees(270) }; page.setRotation(degrees[rot] || PDFLib.degrees(0)); } const anns = S.annotations[originalPageNum]; if (anns && anns.length) { const { width: origW, height: origH } = page.getSize(); anns.forEach(ann => { let ox, oy, ow, oh; if (rot === 0) { ox = ann.x * origW; oy = (1 - ann.y - ann.h) * origH; ow = ann.w * origW; oh = ann.h * origH; } else if (rot === 90) { ox = ann.y * origW; oy = ann.x * origH; ow = ann.h * origW; oh = ann.w * origH; } else if (rot === 180) { ox = (1 - ann.x - ann.w) * origW; oy = ann.y * origH; ow = ann.w * origW; oh = ann.h * origH; } else if (rot === 270) { ox = (1 - ann.y - ann.h) * origW; oy = (1 - ann.x - ann.w) * origH; ow = ann.h * origW; oh = ann.w * origH; } const color = Utils.hexToPdfColor(ann.color); page.drawRectangle({ x: ox, y: oy, width: ow, height: oh, color }); }); } } const bytes = await newDoc.save(); const prefix = S.mode === 'delete' ? 'deleted_' : 'extracted_'; Utils.downloadBlob(bytes, `${prefix}${S.fileName}`); Utils.showToast('处理完成！'); } catch (e) { Utils.showToast('处理失败: ' + e.message, true); } finally { Utils.hideLoading(); } }
async function initEditor() { const canvas = document.getElementById('editor-canvas'); const overlay = document.getElementById('editor-overlay'); const wrapper = document.getElementById('editor-canvas-wrapper'); if (!canvas || !pdfJsDoc) return; const S = pdfStore.get(); const page = S.currentPage; const rot = S.rotations[page] || 0; try { const pdfPage = await pdfJsDoc.getPage(page); const baseVp = pdfPage.getViewport({ scale: 1, rotation: rot }); const maxW = Math.min(window.innerWidth - 80, 900); const displayScale = Math.min(maxW / baseVp.width, 1.5); const renderScale = displayScale * 2; const renderVp = pdfPage.getViewport({ scale: renderScale, rotation: rot }); canvas.width = renderVp.width; canvas.height = renderVp.height; const displayWidth = Math.round(baseVp.width * displayScale); const displayHeight = Math.round(baseVp.height * displayScale); canvas.style.width = displayWidth + 'px'; canvas.style.height = displayHeight + 'px'; const ctx = canvas.getContext('2d'); await pdfPage.render({ canvasContext: ctx, viewport: renderVp }).promise; overlay.style.width = displayWidth + 'px'; overlay.style.height = displayHeight + 'px'; pdfEditorState = { page, rot, displayScale, renderScale, displayWidth, displayHeight, selectedAnnId: null, isDrawing: false, isDragging: false, dragStart: null, drawStart: null }; overlay.className = `editor-overlay ${S.tool === 'select' ? 'tool-select' : ''}`; drawAnnotations(); setupOverlayEvents(); renderAnnotationsList(); } catch (e) { Utils.showToast('编辑器初始化失败: ' + e.message, true); } }
function drawAnnotations() { if (!pdfEditorState) return; const S = pdfStore.get(); const page = S.currentPage; const anns = S.annotations[page] || []; const overlay = document.getElementById('editor-overlay'); if (!overlay) return; const { displayWidth, displayHeight } = pdfEditorState; overlay.querySelectorAll('.annotation-node').forEach(n => n.remove()); anns.forEach(ann => { const node = document.createElement('div'); node.className = `annotation-node ${ann.id === pdfEditorState.selectedAnnId ? 'selected' : ''}`; node.dataset.annId = ann.id; node.style.left = (ann.x * displayWidth) + 'px'; node.style.top = (ann.y * displayHeight) + 'px'; node.style.width = (ann.w * displayWidth) + 'px'; node.style.height = (ann.h * displayHeight) + 'px'; node.style.background = ann.color; node.innerHTML = `<div class="node-label">矩形遮挡</div><div class="node-delete" data-del-ann="${ann.id}">${Icons.close}</div>`; overlay.appendChild(node); }); }
function renderAnnotationsList() { const S = pdfStore.get(); const page = S.currentPage; const anns = S.annotations[page] || []; const list = document.getElementById('editor-annotations-list'); if (!list) return; if (anns.length === 0) { list.innerHTML = '<div class="text-center text-sm text-[--muted] py-4">暂无标注，选择工具后在页面上拖拽绘制</div>'; return; } list.innerHTML = anns.map(ann => ` <div class="flex items-center gap-3 bg-white p-3 rounded-lg border border-[--border] cursor-pointer ${ann.id === pdfEditorState?.selectedAnnId ? 'ring-2 ring-[--green]' : ''}" data-ann-item="${ann.id}"> <div class="w-6 h-6 rounded" style="background:${ann.color}"></div> <span class="text-sm text-[--ink-soft]">矩形遮挡</span> <span class="text-xs text-[--muted] ml-auto">${Math.round(ann.w * 100)}%×${Math.round(ann.h * 100)}%</span> <button class="btn btn-ghost btn-sm" data-del-ann-list="${ann.id}">${Icons.trash}</button> </div> `).join(''); }
function setupOverlayEvents() { const overlay = document.getElementById('editor-overlay'); if (!overlay || !pdfEditorState) return; const { displayWidth, displayHeight } = pdfEditorState; overlay.onmousedown = (e) => { const S = pdfStore.get(); const delBtn = e.target.closest('[data-del-ann]'); if (delBtn) { e.stopPropagation(); deleteAnnotation(delBtn.dataset.delAnn); return; } const annNode = e.target.closest('.annotation-node'); if (annNode) { const annId = annNode.dataset.annId; pdfEditorState.selectedAnnId = annId; pdfEditorState.isDragging = true; const rect = overlay.getBoundingClientRect(); pdfEditorState.dragStart = { x: e.clientX - rect.left, y: e.clientY - rect.top }; drawAnnotations(); renderAnnotationsList(); return; } if (S.tool === 'select') { pdfEditorState.selectedAnnId = null; drawAnnotations(); renderAnnotationsList(); return; } const rect = overlay.getBoundingClientRect(); pdfEditorState.isDrawing = true; pdfEditorState.drawStart = { x: e.clientX - rect.left, y: e.clientY - rect.top }; }; overlay.onmousemove = (e) => { if (!pdfEditorState) return; const rect = overlay.getBoundingClientRect(); const x = e.clientX - rect.left; const y = e.clientY - rect.top; if (pdfEditorState.isDragging && pdfEditorState.selectedAnnId) { const dx = (x - pdfEditorState.dragStart.x) / displayWidth; const dy = (y - pdfEditorState.dragStart.y) / displayHeight; const S = pdfStore.get(); const page = S.currentPage; const anns = S.annotations[page] || []; const ann = anns.find(a => a.id === pdfEditorState.selectedAnnId); if (ann) { ann.x = Math.max(0, Math.min(1 - ann.w, ann.x + dx)); ann.y = Math.max(0, Math.min(1 - ann.h, ann.y + dy)); pdfStore.set(s => { const annotations = { ...s.annotations }; annotations[page] = [...anns]; return { ...s, annotations }; }); pdfEditorState.dragStart = { x, y }; drawAnnotations(); } } else if (pdfEditorState.isDrawing) { const sx = pdfEditorState.drawStart.x; const sy = pdfEditorState.drawStart.y; let preview = overlay.querySelector('.draw-preview'); if (!preview) { preview = document.createElement('div'); preview.className = 'annotation-node draw-preview'; preview.style.background = pdfStore.get().color; overlay.appendChild(preview); } const left = Math.min(sx, x); const top = Math.min(sy, y); const w = Math.abs(x - sx); const h = Math.abs(y - sy); preview.style.left = left + 'px'; preview.style.top = top + 'px'; preview.style.width = w + 'px'; preview.style.height = h + 'px'; } }; overlay.onmouseup = (e) => { if (!pdfEditorState) return; const rect = overlay.getBoundingClientRect(); const x = e.clientX - rect.left; const y = e.clientY - rect.top; if (pdfEditorState.isDragging) { pdfEditorState.isDragging = false; return; } if (pdfEditorState.isDrawing) { const S = pdfStore.get(); const sx = pdfEditorState.drawStart.x; const sy = pdfEditorState.drawStart.y; const dw = Math.abs(x - sx); const dh = Math.abs(y - sy); if (dw < 10 || dh < 10) { pdfEditorState.isDrawing = false; overlay.querySelectorAll('.draw-preview').forEach(n => n.remove()); return; } const newAnn = { id: Utils.uid(), type: S.tool, color: S.color, x: Math.min(sx, x) / displayWidth, y: Math.min(sy, y) / displayHeight, w: dw / displayWidth, h: dh / displayHeight }; pushUndo(); pdfStore.set(s => { const annotations = { ...s.annotations }; annotations[S.currentPage] = [...(annotations[S.currentPage] || []), newAnn]; return { ...s, annotations }; }); pdfEditorState.isDrawing = false; pdfEditorState.selectedAnnId = newAnn.id; overlay.querySelectorAll('.draw-preview').forEach(n => n.remove()); drawAnnotations(); renderAnnotationsList(); } }; }
function deleteAnnotation(annId) { const S = pdfStore.get(); const page = S.currentPage; const anns = S.annotations[page] || []; pushUndo(); pdfStore.set(s => { const annotations = { ...s.annotations }; annotations[page] = anns.filter(a => a.id !== annId); return { ...s, annotations }; }); if (pdfEditorState) pdfEditorState.selectedAnnId = null; drawAnnotations(); renderAnnotationsList(); }
function pushUndo() { const S = pdfStore.get(); pdfUndoStack.push(JSON.parse(JSON.stringify(S.annotations))); if (pdfUndoStack.length > 50) pdfUndoStack.shift(); }
function undoAnnotation() { if (pdfUndoStack.length === 0) return Utils.showToast('没有可撤销的操作', true); const prev = pdfUndoStack.pop(); pdfStore.set(s => ({ ...s, annotations: prev })); if (pdfEditorState) pdfEditorState.selectedAnnId = null; drawAnnotations(); renderAnnotationsList(); }

// PDF 转图片 - 逻辑
async function convertPdfToImages(file) { if (!file || file.type !== 'application/pdf') return Utils.showToast('请选择有效的PDF文件', true); p2iCancelled = false; const S = p2iStore.get(); const statusBox = app.querySelector('#p2i-status'); const titleEl = app.querySelector('#p2i-status-title'); const detailEl = app.querySelector('#p2i-status-detail'); const bar = app.querySelector('#p2i-progress-bar'); const gallery = app.querySelector('#p2i-gallery'); statusBox.classList.remove('hidden'); if (gallery) gallery.classList.add('hidden'); titleEl.innerHTML = `正在解析 PDF... <button class="btn btn-ghost btn-sm ml-3" id="p2i-cancel-btn">取消</button>`; detailEl.textContent = '请稍候'; bar.style.width = '0%'; try { const arrayBuffer = await file.arrayBuffer(); const doc = await pdfjsLib.getDocument({ data: arrayBuffer }).promise; const totalPages = doc.numPages; const zip = S.mode === 'zip' ? new JSZip() : null; const imageResults = S.mode === 'image' ? [] : null; for (let i = 1; i <= totalPages; i++) { if (p2iCancelled) { titleEl.textContent = '已取消'; detailEl.textContent = `已处理 ${i - 1} / ${totalPages} 页后取消`; return; } titleEl.innerHTML = `正在转换... <button class="btn btn-ghost btn-sm ml-3" id="p2i-cancel-btn">取消</button>`; detailEl.textContent = `已处理 ${i} / ${totalPages} 页`; bar.style.width = `${(i / totalPages) * 100}%`; const page = await doc.getPage(i); const viewport = page.getViewport({ scale: S.scale }); const canvas = document.createElement('canvas'); canvas.width = viewport.width; canvas.height = viewport.height; const ctx = canvas.getContext('2d'); await page.render({ canvasContext: ctx, viewport }).promise; if (S.mode === 'zip') { const blob = await new Promise(res => canvas.toBlob(res, `image/${S.format}`, 0.92)); const imgName = `${file.name.replace(/\.pdf$/i, '')}_第${String(i).padStart(3, '0')}页.${S.format === 'jpeg' ? 'jpg' : 'png'}`; zip.file(imgName, blob); } else if (S.mode === 'image') { const blob = await new Promise(res => canvas.toBlob(res, `image/${S.format}`, 0.92)); const ext = S.format === 'jpeg' ? 'jpg' : 'png'; const imgName = `${file.name.replace(/\.pdf$/i, '')}_第${String(i).padStart(3, '0')}页.${ext}`; const imgUrl = URL.createObjectURL(blob); imageResults.push({ blob, url: imgUrl, name: imgName, page: i }); } } if (p2iCancelled) { titleEl.textContent = '已取消'; return; } titleEl.textContent = '正在生成文件...'; detailEl.textContent = '即将开始下载'; if (S.mode === 'zip') { const content = await zip.generateAsync({ type: "blob" }, (metadata) => { detailEl.textContent = `正在打包: ${metadata.percent.toFixed(0)}%`; }); saveAs(content, file.name.replace(/\.pdf$/i, '') + '_图片包.zip'); } else if (S.mode === 'image') { renderImageGallery(imageResults, gallery); } titleEl.textContent = '转换完成！'; detailEl.textContent = S.mode === 'image' ? '图片已生成，可逐张下载' : '文件已开始下载'; Utils.showToast(S.mode === 'image' ? '图片已生成！' : '文件已生成！'); } catch (err) { console.error(err); titleEl.textContent = '转换失败'; detailEl.textContent = 'PDF 可能已加密或损坏，或内存不足'; Utils.showToast('转换失败: ' + err.message, true); } }
function renderImageGallery(images, gallery) { if (!gallery || !images.length) return; gallery.classList.remove('hidden'); if (images.length === 1) { saveAs(images[0].blob, images[0].name); } gallery.innerHTML = ` <div class="bg-white p-6 rounded-2xl border border-[--border]"> <div class="flex items-center justify-between mb-4"> <h3 class="text-lg font-semibold text-[--ink]">转换结果 <span class="text-[--muted] font-normal text-sm">(${images.length} 张图片)</span></h3> <button class="btn btn-primary btn-sm" id="p2i-download-all">全部下载</button> </div> ${images.length === 1 ? '<div class="text-xs text-[--muted] mb-3">已自动下载，也可点击下方图片单独保存</div>' : ''} <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4"> ${images.map((img, idx) => ` <div class="bg-[--bg-2] rounded-xl overflow-hidden border border-[--border] transition hover:shadow-md" style="transition: all .3s"> <div class="aspect-auto bg-[--bg-2] flex items-center justify-center overflow-hidden" style="max-height: 300px"> <img src="${img.url}" alt="第${img.page}页" class="max-w-full max-h-[300px] object-contain" /> </div> <div class="p-3 flex items-center justify-between bg-white"> <span class="text-sm text-[--ink-soft] truncate">第 ${img.page} 页</span> <button class="btn btn-ghost btn-sm" data-p2i-dl="${idx}"> <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg> 下载 </button> </div> </div> `).join('')} </div> </div> `; gallery._images = images; const dlAllBtn = gallery.querySelector('#p2i-download-all'); if (dlAllBtn) { dlAllBtn.addEventListener('click', async () => { dlAllBtn.setAttribute('disabled', ''); dlAllBtn.innerHTML = '<div class="spinner"></div> 下载中...'; for (let i = 0; i < images.length; i++) { saveAs(images[i].blob, images[i].name); if (i < images.length - 1) await new Promise(r => setTimeout(r, 300)); } dlAllBtn.removeAttribute('disabled'); dlAllBtn.textContent = '全部下载'; Utils.showToast('已开始下载全部图片'); }); } }

// 数字转中文大写 - 逻辑
function doConvert() { const input = app.querySelector('#num-input'), output = app.querySelector('#num-output'); if (!input || !output) return; let val = input.value.replace(/[^\d.-]/g, '').replace(/-/g, (m, o) => o === 0 ? '-' : '').replace(/\./g, (m, o, s) => s.indexOf('.') === o ? '.' : ''); if (val !== input.value) input.value = val; if (!val || val === '-' || val === '.') { output.innerHTML = '<span class="text-[--muted] text-base font-sans font-normal">结果将显示在这里</span><div class="copy-icon" style="display:none">' + Icons.copy + '</div>'; return; } const res = Utils.numberToChinese(val); if (res === '数字超出支持范围') { output.innerHTML = '<span class="text-[--accent] text-base font-sans font-normal">数字超出支持范围（最大16位整数）</span><div class="copy-icon" style="display:none">' + Icons.copy + '</div>'; } else { output.innerHTML = `<span>${res}</span><div class="copy-icon">${Icons.copy}</div>`; } }

// 图片转 PDF - 逻辑
async function handleImageFiles(fileList) { const valid = Array.from(fileList).filter(f => f.type.startsWith('image/') || f.name.match(/\.(jpg|jpeg|png|webp|bmp|heic|heif)$/i)); if (!valid.length) return; const results = await Promise.all(valid.map(async file => { try { let blob = file; if (Utils.isHeic(file)) { const res = await heic2any({ blob: file, toType: 'image/jpeg', quality: 0.92 }); blob = Array.isArray(res) ? res[0] : res; } const url = URL.createObjectURL(blob); const { w, h } = await new Promise((res, rej) => { const img = new Image(); img.onload = () => res({ w: img.width, h: img.height }); img.onerror = () => rej(new Error('图片加载失败')); img.src = url; }); return { url, blob, w, h, name: file.name }; } catch { Utils.showToast('处理失败: ' + file.name, true); return null; } })); imageStore.set(s => ({ ...s, files: [...s.files, ...results.filter(Boolean)] })); syncImageListDOM(); }
async function convertToPdf() { const files = imageStore.get().files; if (!files.length) return Utils.showToast('请先选择图片', true); const btn = app.querySelector('#convert-img-btn'); btn.setAttribute('disabled', ''); btn.innerHTML = '<div class="spinner"></div> 正在生成...'; try { const { jsPDF } = window.jspdf; let pdf = null; for (const f of files) { const img = new Image(); img.src = f.url; await new Promise((r, rej) => { img.onload = r; img.onerror = () => rej(new Error('图片加载失败')); }); const c = document.createElement('canvas'); c.width = f.w; c.height = f.h; const ctx = c.getContext('2d'); ctx.fillStyle = '#fff'; ctx.fillRect(0, 0, f.w, f.h); ctx.drawImage(img, 0, 0, f.w, f.h); const S = imageStore.get(); if (S.mode === 'fit') { const o = f.w >= f.h ? 'landscape' : 'portrait'; if (!pdf) pdf = new jsPDF({ unit: 'pt', format: [f.w, f.h], orientation: o }); else pdf.addPage([f.w, f.h], o); pdf.addImage(c, 'JPEG', 0, 0, f.w, f.h, undefined, 'FAST'); } else { const o = S.orient === 'auto' ? (f.w > f.h ? 'landscape' : 'portrait') : S.orient; if (!pdf) pdf = new jsPDF({ orientation: o, unit: 'mm', format: 'a4' }); else pdf.addPage('a4', o); const pw = pdf.internal.pageSize.getWidth(), ph = pdf.internal.pageSize.getHeight(), r = Math.min((pw - 20) / f.w, (ph - 20) / f.h); pdf.addImage(c, 'JPEG', (pw - f.w * r) / 2, (ph - f.h * r) / 2, f.w * r, f.h * r, undefined, 'FAST'); } } pdf.save(`images_${new Date().toISOString().slice(0, 10)}.pdf`); Utils.showToast('PDF 已生成并下载'); } catch (e) { Utils.showToast('生成失败: ' + e.message, true); } finally { btn.removeAttribute('disabled'); btn.innerHTML = '生成并下载 PDF'; } }

// 图片压缩 - 逻辑
async function calculateEstimates(file) { const url = URL.createObjectURL(file); const img = new Image(); img.src = url; await new Promise((r, rej) => { img.onload = r; img.onerror = () => rej(new Error('图片加载失败')); }); URL.revokeObjectURL(url); const c = document.createElement('canvas'); c.width = img.width; c.height = img.height; const ctx = c.getContext('2d'); ctx.drawImage(img, 0, 0); const getBlobSize = (type, q) => new Promise(r => c.toBlob(b => r(b ? b.size : 0), type, q)); const isLargeFile = file.size > 2 * 1024 * 1024; const promises = [getBlobSize('image/jpeg', 0.8), getBlobSize('image/webp', 0.8)]; const [jpeg, webp] = await Promise.all(promises); const png = isLargeFile ? 0 : await getBlobSize('image/png', 1.0); compressStore.set(s => ({ ...s, estimates: { jpeg, webp, png } })); renderFormatCards(); }
async function doCompress() { const S = compressStore.get(); if (!S.file) return; const taskId = ++compressTaskId; const img = new Image(); img.src = S.url; await new Promise((r, rej) => { img.onload = r; img.onerror = () => rej(new Error('图片加载失败')); }); const w = Math.round(img.width * (S.scale / 100)), h = Math.round(img.height * (S.scale / 100)); const c = document.createElement('canvas'); c.width = w; c.height = h; const ctx = c.getContext('2d'); ctx.fillStyle = '#fff'; ctx.fillRect(0, 0, w, h); ctx.drawImage(img, 0, 0, w, h); const blob = await new Promise(r => c.toBlob(r, `image/${S.format}`, S.quality)); if (taskId !== compressTaskId) return; if (S.resultUrl) URL.revokeObjectURL(S.resultUrl); compressStore.set(s => ({ ...s, resultBlob: blob, resultUrl: URL.createObjectURL(blob) })); const preview = app.querySelector('#comp-preview'), placeholder = app.querySelector('#comp-placeholder'); if (preview) { preview.src = compressStore.get().resultUrl; preview.classList.remove('hidden'); placeholder?.classList.add('hidden'); } const elSize = app.querySelector('#comp-new-size'); if (elSize) elSize.textContent = Utils.formatSize(blob.size); const dlBtn = app.querySelector('#comp-dl-btn'); if (dlBtn) dlBtn.removeAttribute('disabled'); }
async function doBatchCompress() { const S = compressStore.get(); if (S.batchFiles.length === 0) return Utils.showToast('请先添加图片', true); compressStore.set(s => ({ ...s, batchProcessing: true, batchProgress: 0, batchResults: [] })); renderBatchCompressTool(); const results = []; for (let i = 0; i < S.batchFiles.length; i++) { const file = S.batchFiles[i]; try { const img = new Image(); const url = URL.createObjectURL(file); img.src = url; await new Promise((r, rej) => { img.onload = r; img.onerror = () => rej(new Error('图片加载失败')); }); const w = Math.round(img.width * (S.scale / 100)), h = Math.round(img.height * (S.scale / 100)); const c = document.createElement('canvas'); c.width = w; c.height = h; const ctx = c.getContext('2d'); ctx.fillStyle = '#fff'; ctx.fillRect(0, 0, w, h); ctx.drawImage(img, 0, 0, w, h); const blob = await new Promise(r => c.toBlob(r, `image/${S.format}`, S.quality)); URL.revokeObjectURL(url); const ext = S.format === 'jpeg' ? 'jpg' : S.format; const baseName = file.name.replace(/\.[^.]+$/, ''); results.push({ blob, name: `${baseName}.${ext}`, origSize: file.size, size: blob.size }); } catch (e) { results.push({ blob: null, name: file.name, origSize: file.size, size: file.size, error: true }); } compressStore.set(s => ({ ...s, batchProgress: i + 1, batchResults: [...results] })); renderBatchCompressTool(); await new Promise(r => setTimeout(r, 10)); } compressStore.set(s => ({ ...s, batchProcessing: false })); await downloadBatchZip(results); renderBatchCompressTool(); Utils.showToast(`批量压缩完成！${results.length} 张图片已打包下载`); }
async function downloadBatchZip(results) { const zip = new JSZip(); const valid = results.filter(r => r.blob); valid.forEach(r => zip.file(r.name, r.blob)); const content = await zip.generateAsync({ type: "blob" }); saveAs(content, `compressed_images_${Date.now()}.zip`); }

// 大小写转换 - 逻辑
function doTextCase() { const input = app.querySelector('#tc-input'), output = app.querySelector('#tc-output'); if (!input || !output) return; textStore.set(s => ({ ...s, input: input.value })); output.value = Utils.convertCase(input.value, textStore.get().mode); const chars = input.value.length, words = input.value.trim() ? input.value.trim().split(/\s+/).length : 0, lines = input.value ? input.value.split('\n').length : 0; const cEl = app.querySelector('#tc-chars'), wEl = app.querySelector('#tc-words'), lEl = app.querySelector('#tc-lines'); if (cEl) cEl.textContent = chars; if (wEl) wEl.textContent = words; if (lEl) lEl.textContent = lines; }

// 随机数据生成 - 逻辑
function doGenerateMock() { const S = mockStore.get(); const count = Math.max(1, Math.min(1000, S.count)); let results = []; try { if (S.type === 'uuid') { for (let i = 0; i < count; i++) results.push(crypto.randomUUID()); } else if (S.type === 'password') { let chars = ''; if (S.pwdOpts.upper) chars += 'ABCDEFGHIJKLMNOPQRSTUVWXYZ'; if (S.pwdOpts.lower) chars += 'abcdefghijklmnopqrstuvwxyz'; if (S.pwdOpts.num) chars += '0123456789'; if (S.pwdOpts.sym) chars += '!@#$%^&*()_+~`|{}[]:;?><,./-='; if (!chars) return Utils.showToast('请至少选择一种字符类型', true); for (let i = 0; i < count; i++) { let pwd = ''; const arr = new Uint32Array(S.pwdLen); crypto.getRandomValues(arr); for (let j = 0; j < S.pwdLen; j++) pwd += chars[arr[j] % chars.length]; results.push(pwd); } } else if (S.type === 'number') { const min = parseFloat(S.numMin) || 0; const max = parseFloat(S.numMax) || 100; const dec = Math.max(0, Math.min(6, S.numDec)); for (let i = 0; i < count; i++) { const rand = crypto.getRandomValues(new Uint32Array(1))[0] / 4294967295; const val = rand * (max - min) + min; results.push(val.toFixed(dec)); } } else if (S.type === 'picker') { const list = S.listText.split('\n').map(s => s.trim()).filter(Boolean); if (!list.length) return Utils.showToast('请输入候选名单', true); const pickCount = Math.min(count, list.length); const shuffled = [...list]; for (let j = shuffled.length - 1; j > 0; j--) { const rand = crypto.getRandomValues(new Uint32Array(1))[0] / 4294967295; const k = Math.floor(rand * (j + 1)); [shuffled[j], shuffled[k]] = [shuffled[k], shuffled[j]]; } results = shuffled.slice(0, pickCount); } const resStr = results.join('\n'); mockStore.set(s => ({ ...s, result: resStr })); const el = app.querySelector('#mock-result'); if (el) el.textContent = resStr; Utils.showToast(`成功生成 ${results.length} 条数据`); } catch (e) { Utils.showToast('生成失败: ' + e.message, true); } }

// 日期计算 - 逻辑
function doCalculateDateDiff() { const startStr = app.querySelector('#date-start').value; const endStr = app.querySelector('#date-end').value; if (!startStr || !endStr) return Utils.showToast('请选择完整的日期', true); const start = new Date(startStr); const end = new Date(endStr); start.setHours(0,0,0,0); end.setHours(0,0,0,0); if (isNaN(start) || isNaN(end)) return Utils.showToast('日期格式无效', true); const totalDays = Math.abs(Math.round((end - start) / (1000 * 60 * 60 * 24))); let workDays = 0, weekendDays = 0; const s = start <= end ? start : end; const e = start <= end ? end : start; const fullWeeks = Math.floor(totalDays / 7); const remainder = totalDays % 7; workDays = fullWeeks * 5; weekendDays = fullWeeks * 2; const startDay = s.getDay(); for (let i = 0; i < remainder; i++) { const day = (startDay + i) % 7; if (day !== 0 && day !== 6) workDays++; else weekendDays++; } const later = start <= end ? end : start; const earlier = start <= end ? start : start; let years = later.getFullYear() - earlier.getFullYear(); let months = later.getMonth() - earlier.getMonth(); let days = later.getDate() - earlier.getDate(); if (days < 0) { months--; days += new Date(later.getFullYear(), later.getMonth(), 0).getDate(); } if (months < 0) { years--; months += 12; } const res = { totalDays, workDays, weekendDays, years, months, days }; dateStore.set(s => ({ ...s, startDate: startStr, endDate: endStr, result: res })); renderDateDiffResult(res); }
function doCalculateDateOffset() { const baseStr = app.querySelector('#date-base').value; const offset = parseInt(app.querySelector('#date-offset').value) || 0; const unit = app.querySelector('#date-unit').value; if (!baseStr) return Utils.showToast('请选择基准日期', true); const base = new Date(baseStr); if (isNaN(base)) return Utils.showToast('日期格式无效', true); const resultDate = new Date(base); if (unit === 'days') { resultDate.setDate(resultDate.getDate() + offset); } else if (unit === 'weeks') { resultDate.setDate(resultDate.getDate() + (offset * 7)); } else if (unit === 'years') { resultDate.setFullYear(resultDate.getFullYear() + offset); if (base.getMonth() === 1 && base.getDate() === 29 && resultDate.getMonth() !== 1) { resultDate.setDate(0); } } else if (unit === 'months') { const dayOfMonth = resultDate.getDate(); resultDate.setDate(1); resultDate.setMonth(resultDate.getMonth() + offset); const targetMonth = resultDate.getMonth(); const targetYear = resultDate.getFullYear(); const targetMonthLastDay = new Date(targetYear, targetMonth + 1, 0).getDate(); resultDate.setDate(Math.min(dayOfMonth, targetMonthLastDay)); } const unitNames = { days: '天', weeks: '周', months: '个月', years: '年' }; const dayOfWeek = resultDate.getDay(); const isWorkday = dayOfWeek !== 0 && dayOfWeek !== 6; const res = { dateStr: Utils.formatDate(resultDate), offset, unitName: unitNames[unit], isWorkday }; dateStore.set(s => ({ ...s, baseDate: baseStr, offset, unit, result: res })); renderDateCalcResult(res); }

  const p2iDl = closest('[data-p2i-dl]'); if (p2iDl) { const gallery = app.querySelector('#p2i-gallery'); if (gallery && gallery._images) { const idx = parseInt(p2iDl.dataset.p2iDl); const img = gallery._images[idx]; if (img) { saveAs(img.blob, img.name); Utils.showToast('已下载第 ' + img.page + ' 页'); } } return; }
});

app.addEventListener('input', e => {
  const id = e.target.id;
  if (id === 'num-input') return doConvert();
  if (id === 'tc-input') return doTextCase();
  if (id === 'comp-q') { compressStore.set(s => ({ ...s, quality: e.target.value / 100 })); app.querySelector('#comp-q-val').textContent = e.target.value; return debouncedDoCompress(); }
  if (id === 'comp-s') { compressStore.set(s => ({ ...s, scale: parseInt(e.target.value) })); app.querySelector('#comp-s-val').textContent = e.target.value; return debouncedDoCompress(); }
  if (id === 'batch-q') { compressStore.set(s => ({ ...s, quality: e.target.value / 100 })); app.querySelector('#batch-q-val').textContent = e.target.value; return; }
  if (id === 'batch-s') { compressStore.set(s => ({ ...s, scale: parseInt(e.target.value) })); app.querySelector('#batch-s-val').textContent = e.target.value; return; }
  if (id === 'mock-count') mockStore.set(s => ({ ...s, count: parseInt(e.target.value) }));
  if (id === 'mock-pwd-len') { mockStore.set(s => ({ ...s, pwdLen: parseInt(e.target.value) })); e.target.previousElementSibling.textContent = `密码长度: ${e.target.value}`; }
  if (id === 'pwd-upper') mockStore.set(s => ({ ...s, pwdOpts: { ...s.pwdOpts, upper: e.target.checked } }));
  if (id === 'pwd-lower') mockStore.set(s => ({ ...s, pwdOpts: { ...s.pwdOpts, lower: e.target.checked } }));
  if (id === 'pwd-num') mockStore.set(s => ({ ...s, pwdOpts: { ...s.pwdOpts, num: e.target.checked } }));
  if (id === 'pwd-sym') mockStore.set(s => ({ ...s, pwdOpts: { ...s.pwdOpts, sym: e.target.checked } }));
  if (id === 'mock-num-min') mockStore.set(s => ({ ...s, numMin: e.target.value }));
  if (id === 'mock-num-max') mockStore.set(s => ({ ...s, numMax: e.target.value }));
  if (id === 'mock-num-dec') mockStore.set(s => ({ ...s, numDec: parseInt(e.target.value) }));
  if (id === 'mock-list') mockStore.set(s => ({ ...s, listText: e.target.value }));
  if (id === 'p2i-scale') p2iStore.set(s => ({ ...s, scale: parseFloat(e.target.value) }));
  if (id === 'p2i-format') p2iStore.set(s => ({ ...s, format: e.target.value }));
  // Tool 02: PDF 合并与拆分
  if (id === 'split-ranges-input') pdfMsStore.set(s => ({ ...s, splitRanges: e.target.value }));
});

app.addEventListener('change', e => { const id = e.target.id; if (id === 'p2i-scale') { p2iStore.set(s => ({ ...s, scale: parseFloat(e.target.value) })); return; } if (id === 'p2i-format') { p2iStore.set(s => ({ ...s, format: e.target.value })); return; } });

window.addEventListener('keydown', (e) => { if ((e.ctrlKey || e.metaKey) && e.key === 'z') { const S = pdfStore.get(); if (S.view === 'edit') { e.preventDefault(); undoAnnotation(); } } });
window.addEventListener('resize', () => { if (pdfResizeTimer) clearTimeout(pdfResizeTimer); pdfResizeTimer = setTimeout(() => { const S = pdfStore.get(); if (S.view === 'edit' && pdfEditorState) { initEditor(); } }, 300); });

app.addEventListener('files-selected', async e => {
  const zone = e.target;
  if (zone.id === 'img-drop') return handleImageFiles(e.detail);
  // Tool 02: PDF 合并与拆分
  if (zone.id === 'ms-merge-drop') return handlePdfMsFiles(e.detail, 'merge');
  if (zone.id === 'ms-split-drop') return handlePdfMsFiles(e.detail, 'split');
  if (zone.id === 'pdf-drop') {
    const file = e.detail[0];
    if (!file || file.type !== 'application/pdf') return Utils.showToast('请选择有效的PDF文件', true);
    const dropEl = document.getElementById('pdf-drop'); if (dropEl) dropEl.style.pointerEvents = 'none';
    try {
      Utils.showToast('正在解析 PDF...');
      pdfArrayBuffer = await file.arrayBuffer();
      pdfJsDoc = await pdfjsLib.getDocument({ data: pdfArrayBuffer.slice(0) }).promise;
      currentFile = file;
      pdfStore.set({ fileName: file.name, pageCount: pdfJsDoc.numPages, mode: 'delete', selected: [], view: 'grid', currentPage: 0, tool: 'select', color: '#ffffff', rotations: {}, annotations: {}, pageOrder: Array.from({ length: pdfJsDoc.numPages }, (_, i) => i + 1) });
      renderPdfTool();
    } catch (err) { Utils.showToast('PDF 解析失败，可能已加密或损坏', true); if (dropEl) dropEl.style.pointerEvents = 'auto'; }
    return;
  }
  if (zone.id === 'p2i-drop') { const file = e.detail[0]; if (!file || file.type !== 'application/pdf') return Utils.showToast('请选择有效的PDF文件', true); p2iStore.set(s => ({ ...s, pendingFile: file })); return renderPdfToImageTool(); }
  if (zone.id === 'comp-drop') { const file = e.detail[0]; if (!file || !file.type.startsWith('image/')) return Utils.showToast('请选择有效的图片', true); const s = compressStore.get(); if (s.url) URL.revokeObjectURL(s.url); if (s.resultUrl) URL.revokeObjectURL(s.resultUrl); const url = URL.createObjectURL(file); compressStore.set({ file, url, name: file.name, origSize: file.size, quality: 0.8, format: 'jpeg', scale: 100, resultBlob: null, resultUrl: '', estimates: { jpeg: 0, webp: 0, png: 0 } }); app.querySelector('#comp-ctrl')?.classList.remove('hidden'); app.querySelector('#comp-orig-size').textContent = Utils.formatSize(file.size); app.querySelector('#comp-new-size').textContent = '计算中...'; const preview = app.querySelector('#comp-preview'), placeholder = app.querySelector('#comp-placeholder'); if (preview) { preview.src = url; preview.classList.remove('hidden'); placeholder?.classList.add('hidden'); } calculateEstimates(file); return doCompress(); }
  if (zone.id === 'comp-batch-drop') { const files = [...e.detail].filter(f => f.type.startsWith('image/')); if (files.length === 0) return Utils.showToast('请选择有效的图片', true); compressStore.set(s => ({ ...s, batchFiles: [...s.batchFiles, ...files], batchResults: [], batchProgress: 0 })); return renderBatchCompressTool(); }
});

window.addEventListener('beforeunload', () => {
  imageStore.get().files.forEach(f => URL.revokeObjectURL(f.url));
  const cs = compressStore.get(); ['url', 'resultUrl'].forEach(k => { if (cs[k]) URL.revokeObjectURL(cs[k]); });
  const gallery = document.querySelector('#p2i-gallery'); if (gallery && gallery._images) gallery._images.forEach(img => URL.revokeObjectURL(img.url));
  pdfEditorState = null;
  if (pdfObserver) pdfObserver.disconnect();
  if (pdfSortable) pdfSortable.destroy();
  if (msSortable) msSortable.destroy();
});
window.addEventListener('error', (e) => { console.error('全局错误:', e.error || e.message); Utils.showToast('发生未知错误，请刷新重试', true); });
window.addEventListener('unhandledrejection', (e) => { console.error('未捕获的 Promise 错误:', e.reason); Utils.showToast('操作失败: ' + (e.reason?.message || '未知错误'), true); e.preventDefault?.(); });

// ═══════════════════════════════════════════
// 9. 路由
// ═══════════════════════════════════════════
const ROUTES = {
  '/': renderHome,
  '/text-case': renderTextCaseTool,
  '/pdf-merge-split': renderPdfMsTool,
  '/pdf-split-merge': renderPdfTool,
  '/pdf-to-image': renderPdfToImageTool,
  '/date-calculator': renderDateTool,
  '/number-to-chinese': renderNumberTool,
  '/mock-generator': renderMockTool,
  '/image-compress': renderCompressTool,
  '/image-to-pdf': renderImageTool
};

function router() {
  const base = (location.hash.slice(1) || '/').split('?')[0];
  if (base !== '/image-to-pdf' && sortableInst) { sortableInst.destroy(); sortableInst = null; }
  if (base !== '/pdf-split-merge' && pdfObserver) { pdfObserver.disconnect(); pdfObserver = null; }
  if (base !== '/pdf-split-merge' && pdfSortable) { pdfSortable.destroy(); pdfSortable = null; }
  if (base !== '/pdf-split-merge') { pdfEditorState = null; pdfUndoStack = []; }
  // 离开合并/拆分页面时清理 Sortable
  if (base !== '/pdf-merge-split' && msSortable) { msSortable.destroy(); msSortable = null; }
  if (base !== '/pdf-to-image') {
    const gallery = document.querySelector('#p2i-gallery');
    if (gallery && gallery._images) { gallery._images.forEach(img => URL.revokeObjectURL(img.url)); gallery._images = null; }
    p2iStore.set(s => ({ ...s, pendingFile: null }));
  }
  (ROUTES[base] || renderHome)();
  window.scrollTo(0, 0);
}

window.addEventListener('hashchange', router);
window.addEventListener('DOMContentLoaded', () => { if (!location.hash) location.hash = '#/'; else router(); });
</script>
</body>
</html>
