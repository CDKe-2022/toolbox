<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>工具集 · 效率工具箱</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300;9..144,400;9..144,600;9..144,700;9..144,900&family=Noto+Sans+SC:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="assets/css/common.css">
</head>
<body class="page-enter bg-gradient-to-br from-gray-50 to-gray-100 min-h-screen">

<div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8 md:py-12 relative z-10">
  
  <!-- 头部区域 -->
  <header class="mb-12">
    <div class="deco-line mb-6"></div>
    <div class="flex flex-col md:flex-row md:items-end md:justify-between gap-4">
      <div>
        <h1 class="font-display text-5xl md:text-6xl font-bold hero-title mb-4 leading-tight">效率工具集</h1>
        <p class="text-[--ink-soft] text-lg font-light">简洁、纯粹、专注的本地化工具，解决日常需求。</p>
      </div>
      <span class="tool-num">Local Tools</span>
    </div>
  </header>

  <!-- 分类筛选标签 -->
  <div id="categories-container" class="flex flex-wrap gap-3 mb-8">
    <!-- 分类按钮将由 JS 动态生成，初始化后缓存，避免重复创建 -->
  </div>

  <!-- 工具卡片网格 -->
  <div id="tools-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 mb-12">
    <!-- 工具卡片将由 JS 动态生成，使用DocumentFragment批量插入 -->
  </div>

  <!-- 底部说明 -->
  <footer class="text-center text-sm text-[--muted] py-8 border-t border-[--border]">
    <p>所有工具均在浏览器本地运行，不会上传任何数据，请放心使用。</p>
    <p class="mt-2">当前已有 <span id="tool-count">0</span> 个工具可用</p>
  </footer>
</div>

<script src="assets/js/common.js"></script>
<script src="assets/js/components.js"></script>
<script src="assets/js/tools-data.js"></script>
<script>
  let currentCategory = '全部';
  const categoryButtons = new Map(); // 缓存分类按钮，避免重复创建DOM

  // 🔧 优化1：数据验证函数，防止数据加载失败导致白屏
  function validateData() {
    if (!window.toolData || 
        !Array.isArray(window.toolData.tools) || 
        !Array.isArray(window.toolData.categories)) {
      document.getElementById('tools-grid').innerHTML = `
        <div class="col-span-full text-center py-12">
          <p class="text-[--muted] text-lg">工具数据加载失败</p>
          <p class="text-[--muted] text-sm mt-2">请刷新页面或检查网络连接</p>
        </div>
      `;
      return false;
    }
    return true;
  }

  // 初始化页面
  document.addEventListener('DOMContentLoaded', () => {
    if (!validateData()) return; // 数据验证失败则终止初始化
    renderCategories();
    renderTools();
    updateToolCount();
  });

  // 🔧 优化2：分类按钮初始化后缓存，切换时只更新激活状态，避免重建整个按钮组
  function renderCategories() {
    const container = document.getElementById('categories-container');
    const fragment = document.createDocumentFragment();
    
    window.toolData.categories.forEach(cat => {
      const btn = document.createElement('button');
      btn.className = 'cat-tab' + (cat === currentCategory ? ' active' : '');
      btn.textContent = cat;
      btn.addEventListener('click', () => {
        if (cat === currentCategory) return; // 避免相同分类重复触发
        setActiveCategory(cat); // 调用状态切换函数，只更新class，不重建DOM
      });
      categoryButtons.set(cat, btn); // 缓存按钮引用
      fragment.appendChild(btn);
    });
    
    container.appendChild(fragment); // 一次性添加，减少重排
  }

  // 🔧 优化3：状态切换函数，只修改按钮的class，不重建整个分类按钮组
  function setActiveCategory(category) {
    const oldBtn = categoryButtons.get(currentCategory);
    const newBtn = categoryButtons.get(category);
    
    oldBtn?.classList.remove('active'); // 移除旧激活状态
    newBtn?.classList.add('active'); // 添加新激活状态
    
    currentCategory = category;
    renderTools(); // 重新渲染工具列表（这里仍然重建工具卡片，但数量较少）
  }

  // 🔧 优化4：工具卡片使用DocumentFragment批量插入，减少多次appendChild带来的重排
  function renderTools() {
    const grid = document.getElementById('tools-grid');
    const fragment = document.createDocumentFragment();
    
    const filteredTools = currentCategory === '全部' 
      ? window.toolData.tools 
      : window.toolData.tools.filter(t => t.category === currentCategory);

    filteredTools.forEach(tool => {
      const card = document.createElement('tool-card');
      card.setAttribute('num', tool.num);
      card.setAttribute('name', tool.name);
      card.setAttribute('desc', tool.desc);
      card.setAttribute('href', tool.href);
      card.setAttribute('status', tool.status);
      card.innerHTML = tool.icon;
      fragment.appendChild(card); // 先添加到片段，不直接操作DOM
    });
    
    grid.replaceChildren(fragment); // 一次性替换，减少重排重绘
  }

  // 更新工具总数
  function updateToolCount() {
    document.getElementById('tool-count').textContent = window.toolData.tools.length;
  }
</script>

</body>
</html>
