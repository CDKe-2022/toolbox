<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>图片转 PDF · 工具集</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300;9..144,400;9..144,600;9..144,700;9..144,900&family=Noto+Sans+SC:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/heic2any/0.0.4/heic2any.min.js"></script>
<link rel="stylesheet" href="../assets/css/common.css">
</head>
<body class="page-enter">

<div class="max-w-3xl mx-auto px-6 py-12 relative z-10">
  <header class="flex items-center justify-between mb-12">
    <button class="btn btn-ghost" onclick="goHome()">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
        <path d="M10 4L6 8L10 12" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      返回主页
    </button>
    <span class="tool-num">Tool 02</span>
  </header>
  
  <div class="mb-10">
    <div class="deco-line mb-6"></div>
    <h2 class="font-display text-5xl md:text-6xl font-bold text-[--green] mb-4 leading-tight">图片转 PDF</h2>
    <p class="text-[--ink-soft] text-lg font-light">将多张图片合并为单个 PDF 文件，支持 JPEG / PNG / HEIC 等格式。</p>
  </div>
  
  <div class="space-y-6">
    <div class="drop-zone" id="drop-zone">
      <input type="file" id="file-input" multiple accept="image/jpeg,image/png,image/webp,image/bmp,image/heic,image/heif" class="hidden">
      <div class="tool-icon mx-auto mb-4" style="width:52px;height:52px;">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
          <path d="M12 16V4M12 4L7 9M12 4L17 9M5 20H19" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
      <p class="font-medium text-[--ink] mb-1 text-base">点击或拖拽图片到此处</p>
      <p class="text-xs text-[--muted]">支持 JPEG、PNG、WebP、BMP、HEIC，可多选</p>
    </div>
    
    <div id="image-list-section" class="hidden">
      <div class="flex items-center justify-between mb-3">
        <label class="text-sm font-medium text-[--ink-soft]">
          已选图片 <span id="image-count" class="text-[--muted] ml-1"></span>
        </label>
        <button class="btn btn-ghost text-xs py-1.5 px-3" id="clear-images-btn">全部清除</button>
      </div>
      <div id="image-list" class="grid grid-cols-4 sm:grid-cols-6 gap-3 mb-8"></div>
      
      <div class="mb-6">
        <label class="block text-sm font-medium text-[--ink-soft] mb-3">页面方向</label>
        <div class="flex gap-3">
          <div class="orient-option active" data-orient="auto">
            <svg width="22" height="22" viewBox="0 0 22 22" fill="none" class="mx-auto mb-1.5">
              <rect x="3" y="3" width="16" height="16" rx="2" stroke="currentColor" stroke-width="1.5" stroke-dasharray="2 2"/>
              <path d="M11 7V15M11 7L8 10M11 7L14 10" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
            <div class="font-medium">自动</div>
            <div class="text-xs opacity-75 mt-0.5">按图片比例</div>
          </div>
          <div class="orient-option" data-orient="portrait">
            <svg width="22" height="22" viewBox="0 0 22 22" fill="none" class="mx-auto mb-1.5">
              <rect x="6" y="2" width="10" height="18" rx="1.5" stroke="currentColor" stroke-width="1.5"/>
            </svg>
            <div class="font-medium">纵向</div>
            <div class="text-xs opacity-75 mt-0.5">竖向 A4</div>
          </div>
          <div class="orient-option" data-orient="landscape">
            <svg width="22" height="22" viewBox="0 0 22 22" fill="none" class="mx-auto mb-1.5">
              <rect x="2" y="6" width="18" height="10" rx="1.5" stroke="currentColor" stroke-width="1.5"/>
            </svg>
            <div class="font-medium">横向</div>
            <div class="text-xs opacity-75 mt-0.5">横向 A4</div>
          </div>
        </div>
      </div>
      
      <button id="convert-btn" class="btn btn-primary w-full py-4 text-base font-medium">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
          <path d="M3 11V13C3 13.55 3.45 14 4 14H12C12.55 14 13 13.55 13 13V11M8 2V10M8 2L5 5M8 2L11 5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        生成并下载 PDF
      </button>
    </div>
    
    <div class="info-card mt-12">
      <h4 class="text-sm font-semibold text-[--green] mb-3 flex items-center gap-2">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
          <circle cx="7" cy="7" r="6" stroke="currentColor" stroke-width="1.3"/>
          <path d="M7 4V7.5M7 9.5V10" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
        </svg>
        使用说明
      </h4>
      <ul class="text-xs text-[--ink-soft] space-y-1.5 leading-relaxed">
        <li>· 所有图片处理均在本地完成，不会上传到任何服务器</li>
        <li>· HEIC 格式（苹果照片）将自动转换为 JPEG 后嵌入 PDF</li>
        <li>· 每张图片占一页，按上传顺序排列，自动适配 A4 页面并居中</li>
        <li>· 选择"自动"方向时，横图横向、竖图纵向，类似预览的效果</li>
      </ul>
    </div>
  </div>
</div>

<script src="../assets/js/common.js"></script>
<script src="../assets/js/image-to-pdf.js"></script>
</body>
</html>
