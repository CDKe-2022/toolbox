<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>数字转中文大写 · 工具集</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300;9..144,400;9..144,600;9..144,700;9..144,900&family=Noto+Sans+SC:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="../assets/css/common.css">
</head>
<body class="page-enter">

<div class="max-w-8xl mx-auto px-6 py-12 relative z-10">
  <header class="flex items-center justify-between mb-12">
    <tool-button variant="ghost" onclick="goHome()">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
        <path d="M10 4L6 8L10 12" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      返回主页
    </tool-button>
    <span class="tool-num">Tool 01</span>
  </header>
  
  <div class="mb-10">
    <div class="deco-line mb-6"></div>
    <h2 class="font-display text-5xl md:text-6xl font-bold text-[--green] mb-4 leading-tight">数字转中文大写</h2>
    <p class="text-[--ink-soft] text-lg font-light">输入阿拉伯数字，自动转换为人民币大写金额格式。</p>
  </div>
  
  <div class="space-y-6">
    <div>
      <label class="block text-sm font-medium text-[--ink-soft] mb-3">输入数字</label>
      <input type="text" id="num-input" class="input font-display text-2xl w-full" placeholder="例如 1234.56" inputmode="decimal">
      <div class="keypad-hint">
        <button data-add="100">+100</button>
        <button data-add="1000">+1,000</button>
        <button data-add="10000">+1万</button>
        <button data-add="100000000">+1亿</button>
        <button id="clear-btn">清空</button>
      </div>
    </div>
    
    <div>
      <label class="block text-sm font-medium text-[--ink-soft] mb-3">中文大写</label>
      <div id="num-output" class="result-box w-full">
        <span class="text-[--muted] text-base font-sans font-normal">结果将显示在这里</span>
      </div>
    </div>
    
    <div class="flex flex-wrap gap-3 pt-2">
      <tool-button id="copy-input-btn" variant="primary">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
          <rect x="4" y="4" width="8" height="8" rx="1.5" stroke="currentColor" stroke-width="1.3"/>
          <path d="M3 9V3C3 2.45 3.45 2 4 2H9" stroke="currentColor" stroke-width="1.3"/>
        </svg>
        复制输入
      </tool-button>
      <tool-button id="copy-output-btn" variant="accent">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
          <rect x="4" y="4" width="8" height="8" rx="1.5" stroke="currentColor" stroke-width="1.3"/>
          <path d="M3 9V3C3 2.45 3.45 2 4 2H9" stroke="currentColor" stroke-width="1.3"/>
        </svg>
        复制大写
      </tool-button>
      <tool-button id="clear-all-btn" variant="ghost">清空全部</tool-button>
    </div>
    
    <info-card title="使用说明">
      <li>· 支持整数、小数（最多两位，对应角分）、负数</li>
      <li>· 转换为标准人民币大写金额格式，如"壹仟贰佰叁拾肆元伍角陆分"</li>
      <li>· 可一键复制原始输入或转换后的结果</li>
      <li>· 所有计算在本地完成，不会发送任何数据</li>
      <li>· 支持 URL 参数自动计算：<code>?v=12345.67</code></li>
    </info-card>
  </div>
</div>

<script src="../assets/js/common.js"></script>
<script src="../assets/js/components.js"></script>
<script src="../assets/js/number-to-chinese.js"></script>
</body>
</html>
